<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Travel Journal</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg-card:#14141f;--bg-hover:#1a1a2e;--accent:#e8a87c;--accent-dark:#c47a4a;--accent-light:#f5d0b0;--text:#e8e6e3;--text-muted:#8a8a9a;--text-dim:#5a5a6a;--border:#2a2a3a;--success:#4ade80;--danger:#ef4444;--overlay:rgba(0,0,0,0.75);--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--max-w:720px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans KR','Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
input,select,textarea,button{font-family:inherit;font-size:inherit}img{-webkit-user-drag:none}

/* ─── PC 중앙 정렬 레이아웃 ─── */
#app{display:flex;flex-direction:column;height:100%;max-width:var(--max-w);margin:0 auto;padding-top:var(--safe-top);position:relative}
@media(min-width:768px){
  #app{border-left:1px solid var(--border);border-right:1px solid var(--border)}
  body{background:#050508}
}
.header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:100}
.header-left{display:flex;align-items:center;gap:10px}
.header-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));display:flex;align-items:center;justify-content:center}
.header-title{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.header-sub{font-size:11px;color:var(--text-muted);margin-top:1px}
.header-right{display:flex;align-items:center;gap:8px}
.sync-badge{display:flex;align-items:center;gap:3px;padding:3px 7px;border-radius:5px;font-size:10px;cursor:pointer}
.sync-badge.syncing{color:var(--accent)}.sync-badge.synced{color:var(--success)}.sync-badge.error{color:var(--danger)}.sync-badge.idle{color:var(--text-dim)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;border:none;cursor:pointer;font-weight:500;font-size:13px;border-radius:8px;transition:all 0.2s;font-family:inherit}
.btn-primary{padding:8px 16px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff}
.btn-default{padding:8px 16px;background:var(--bg-card);color:var(--text);border:1px solid var(--border)}
.btn-ghost{padding:5px 8px;background:none;color:var(--text-muted)}
.btn-danger{padding:8px 16px;background:rgba(239,68,68,0.1);color:var(--danger);border:1px solid rgba(239,68,68,0.2)}
.btn-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.35);border:none;cursor:pointer}

.tabs{flex-shrink:0;display:flex;background:rgba(10,10,15,0.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{display:flex;align-items:center;gap:5px;padding:10px 16px;white-space:nowrap;background:none;border:none;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text-muted);border-bottom:2px solid transparent;transition:all 0.2s}
.tab-btn.active{color:var(--accent);font-weight:600;border-bottom-color:var(--accent)}
.tab-btn svg{flex-shrink:0}

.filter-bar{flex-shrink:0;display:flex;gap:6px;padding:10px 18px;flex-wrap:wrap;align-items:center;background:var(--bg)}
.search-box{flex:1;min-width:140px;display:flex;align-items:center;background:var(--bg-card);border-radius:8px;padding:0 10px;border:1px solid var(--border)}
.search-box input{flex:1;padding:9px 8px;background:none;border:none;color:var(--text);font-size:13px;outline:none}
.filter-btn{padding:7px 10px;border-radius:7px;font-size:12px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px}
.filter-btn.active{background:rgba(232,168,124,0.12);border-color:var(--accent);color:var(--accent)}
.filter-select{padding:7px 10px;border-radius:7px;font-size:12px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);cursor:pointer;outline:none;font-family:inherit}

.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 18px 24px;padding-bottom:calc(24px + var(--safe-bottom))}

.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Gallery ─── */
.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding-top:8px}
.card{border-radius:10px;overflow:hidden;background:var(--bg-card);border:1px solid var(--border);cursor:pointer;transition:all 0.25s;animation:fadeIn 0.3s ease both}
.card:active{transform:scale(0.98)}
@media(hover:hover){.card:hover{transform:translateY(-2px);box-shadow:0 4px 18px rgba(232,168,124,0.1)}}
.card-img-wrap{position:relative;padding-top:70%;overflow:hidden}
.card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:var(--bg-hover)}
.card-photo-count{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.55);border-radius:5px;padding:2px 7px;font-size:10px;color:#fff}
.card-fav-btn{position:absolute;top:6px;left:6px;background:rgba(0,0,0,0.3);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.card-trip-badge{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,0.55);border-radius:5px;padding:2px 8px;font-size:9px;color:var(--accent-light)}
.card-music-badge{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.55);border-radius:5px;padding:2px 8px;font-size:9px;color:#60a5fa}
.card-body{padding:8px 10px}
.card-location{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-date{font-size:10px;color:var(--text-muted);margin-top:2px}
.card-memo{font-size:11px;color:var(--text-muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
.card-tags{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.tag{font-size:9px;padding:1px 6px;border-radius:6px;background:rgba(232,168,124,0.1);color:var(--accent)}

/* ─── Trips ─── */
.trip-card{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;cursor:pointer;background:var(--bg-card);border:1px solid var(--border);transition:all 0.2s;margin-bottom:8px}
.trip-card.open{border-color:rgba(232,168,124,0.3)}
.trip-cover{width:56px;height:56px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--bg-hover)}
.trip-cover img{width:100%;height:100%;object-fit:cover}
.trip-name{font-size:15px;font-weight:700;margin-bottom:2px}
.trip-date{font-size:11px;color:var(--text-muted)}
.trip-stats{display:flex;gap:10px;margin-top:3px;font-size:11px;color:var(--text-dim)}
.trip-entries-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:6px;animation:fadeIn 0.3s ease}
.trip-entry-card{border-radius:8px;overflow:hidden;background:var(--bg-hover);border:1px solid var(--border);cursor:pointer}
.trip-entry-card .img-wrap{position:relative;padding-top:60%}
.trip-entry-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.trip-entry-card .info{padding:6px 8px}
.trip-entry-card .info p:first-child{font-size:11px;font-weight:600}
.trip-entry-card .info p:last-child{font-size:10px;color:var(--text-muted)}

/* ─── Map ─── */
.map-container{border-radius:12px;overflow:hidden;border:1px solid var(--border);background:#0a1628;position:relative;margin-top:8px;height:300px}
.map-legend{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.6);border-radius:6px;padding:4px 8px;font-size:10px;color:var(--text-muted);z-index:500}
.location-list{display:grid;grid-template-columns:1fr;gap:6px;margin-top:12px}
.location-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);cursor:pointer;transition:all 0.2s}
.location-item:active{background:var(--bg-hover)}
.location-thumb{width:36px;height:36px;border-radius:7px;overflow:hidden;flex-shrink:0}
.location-thumb img{width:100%;height:100%;object-fit:cover}

/* ─── Calendar ─── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin:12px 0 16px}
.cal-title{font-size:18px;font-weight:700;font-family:'Playfair Display',serif}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-header{text-align:center;font-size:11px;font-weight:600;color:var(--text-muted);padding:6px 0}
.cal-day{min-height:50px;border-radius:6px;background:var(--bg-card);border:1px solid var(--border);padding:3px 4px;font-size:10px}
.cal-day.empty{background:transparent;border:none}.cal-day.today{border-color:var(--accent)}
.cal-day.has-entry{background:rgba(232,168,124,0.05);border-color:rgba(232,168,124,0.2);cursor:pointer}
.cal-day.today .cal-day-num{font-weight:700;color:var(--accent)}
.cal-day-entry{font-size:8px;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4;cursor:pointer}

/* ─── Timeline ─── */
.tl-year{font-size:26px;font-weight:700;color:var(--accent);font-family:'Playfair Display',serif}
.tl-line{position:relative;padding-left:20px}
.tl-line::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,rgba(232,168,124,0.3),transparent)}
.tl-item{position:relative;margin-bottom:12px;cursor:pointer;animation:fadeIn 0.3s ease both}
.tl-dot{position:absolute;left:-17px;top:12px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.tl-card{padding:10px 12px;border-radius:9px;background:var(--bg-card);border:1px solid var(--border);transition:all 0.2s}
.tl-card:active{background:var(--bg-hover)}
.tl-photos{display:flex;gap:4px;margin-top:8px;overflow-x:auto;padding-bottom:2px}
.tl-photos img{width:52px;height:52px;border-radius:6px;object-fit:cover;flex-shrink:0}

/* ─── Stats ─── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.stat-card{padding:16px;border-radius:10px;text-align:center;background:var(--bg-card);border:1px solid var(--border)}
.stat-val{font-size:24px;font-weight:700;font-family:'Playfair Display',serif}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:3px}
.chart-container{padding:18px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:12px}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:90px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center}
.chart-bar{width:100%;max-width:30px;border-radius:3px;background:linear-gradient(to top,var(--accent-dark),var(--accent));transition:height 0.5s}
.chart-bar.empty{background:var(--border)}
.chart-bar-label{font-size:8px;color:var(--text-dim);margin-top:3px}
.chart-bar-val{font-size:9px;color:var(--text-muted);margin-bottom:2px}
.rank-list{padding:16px;border-radius:10px;background:var(--bg-card);border:1px solid var(--border)}
.rank-item{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.rank-num{font-size:12px;font-weight:600;width:18px}.rank-name{flex:1;font-size:12px}.rank-count{font-size:11px;color:var(--text-muted)}

/* ─── Modal (외부 클릭 안 꺼짐) ─── */
.modal-overlay{position:fixed;inset:0;z-index:200;background:var(--overlay);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.25s ease}
@media(min-width:768px){.modal-overlay{align-items:center;padding:16px}}
.modal{width:100%;max-width:var(--max-w);max-height:95vh;overflow-y:auto;background:var(--bg);border-radius:16px 16px 0 0;animation:slideUp 0.3s ease;-webkit-overflow-scrolling:touch}
@media(min-width:768px){.modal{border-radius:14px;max-height:90vh;border:1px solid var(--border)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.modal-header h2{font-size:16px;font-weight:700}
.modal-body{padding:18px}

/* ─── Detail ─── */
.detail-photo-wrap{position:relative}
.detail-photo{width:100%;max-height:50vh;object-fit:contain;display:block;background:#000}
.detail-nav-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.4);border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.detail-nav-btn.left{left:8px}.detail-nav-btn.right{right:8px}
.detail-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.detail-dot{height:6px;border-radius:3px;border:none;cursor:pointer;transition:all 0.3s}
.detail-dot.active{width:18px;background:var(--accent)}.detail-dot.inactive{width:6px;background:rgba(255,255,255,0.4)}
.detail-content{padding:18px}
.detail-title{font-size:18px;font-weight:700;font-family:'Playfair Display',serif}
.detail-meta{font-size:12px;color:var(--text-muted);margin-top:3px}
.detail-memo{font-size:13px;margin-top:14px;line-height:1.7}
.detail-tags{display:flex;gap:5px;margin-top:14px;flex-wrap:wrap}
.detail-tag{font-size:11px;padding:3px 10px;border-radius:14px;background:rgba(232,168,124,0.1);color:var(--accent)}
.detail-thumbs{display:flex;gap:5px;margin-top:14px;overflow-x:auto}
.detail-thumb{width:46px;height:46px;border-radius:6px;object-fit:cover;flex-shrink:0;cursor:pointer;transition:all 0.2s}
.detail-thumb.active{border:2px solid var(--accent);opacity:1}.detail-thumb.inactive{border:2px solid transparent;opacity:0.45}
.detail-actions{display:flex;gap:8px;margin-top:20px;border-top:1px solid var(--border);padding-top:14px}

/* ─── Form ─── */
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px;display:block}
.form-input{width:100%;padding:10px 12px;border-radius:8px;font-size:13px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);outline:none;font-family:inherit}
.form-input:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.upload-zone{width:100%;padding:18px;border-radius:8px;background:var(--bg-card);border:2px dashed var(--border);color:var(--text-muted);font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all 0.2s;font-family:inherit}
.upload-zone:active{border-color:var(--accent)}
.photo-previews{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.photo-preview{position:relative}
.photo-preview img{width:50px;height:50px;border-radius:6px;object-fit:cover}
.photo-preview .remove-btn{position:absolute;top:-3px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--danger);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff}

/* ─── Location Search ─── */
.loc-results{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;margin-top:4px;max-height:150px;overflow-y:auto;display:none}
.loc-results.show{display:block}
.loc-result-item{padding:9px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border)}
.loc-result-item:last-child{border-bottom:none}
.loc-result-item:active{background:var(--bg-hover)}
.loc-searching{padding:10px;font-size:11px;color:var(--text-muted);text-align:center}

/* ─── Slideshow ─── */
.slideshow{position:fixed;inset:0;z-index:300;background:#000;animation:fadeIn 0.4s ease}
.slideshow-img-wrap{position:absolute;inset:0;overflow:hidden}
.slideshow-img{width:100%;height:100%;object-fit:contain;background:#000}
.slideshow-gradient{position:absolute;inset:0;background:linear-gradient(transparent 35%,rgba(0,0,0,0.85))}
.slideshow-progress{position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.08);z-index:10}
.slideshow-progress-bar{height:100%;background:var(--accent)}
.slideshow-top{position:absolute;top:10px;left:10px;right:10px;z-index:10;display:flex;justify-content:space-between;align-items:center}
.slideshow-counter{color:rgba(255,255,255,0.5);font-size:11px}
.slideshow-info{position:absolute;bottom:0;left:0;right:0;padding:28px 18px 85px;z-index:10}
.slideshow-trip{font-size:12px;color:var(--accent-light);margin-bottom:4px;opacity:0.7}
.slideshow-location{font-size:22px;font-weight:700;color:#fff;font-family:'Playfair Display',serif;text-shadow:0 2px 6px rgba(0,0,0,0.5)}
.slideshow-date{font-size:13px;color:rgba(255,255,255,0.6);margin-top:3px}
.slideshow-memo{font-size:13px;color:rgba(255,255,255,0.7);margin-top:6px;line-height:1.5;max-width:450px}
.slideshow-controls{position:absolute;bottom:24px;left:0;right:0;display:flex;justify-content:center;align-items:center;gap:14px;z-index:10}
.ss-ctrl-btn{background:rgba(0,0,0,0.3);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ss-play-btn{background:rgba(232,168,124,0.2);border:2px solid var(--accent);border-radius:50%;width:48px;height:48px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ss-music-label{position:absolute;bottom:64px;left:50%;transform:translateX(-50%);z-index:10;background:rgba(0,0,0,0.4);border-radius:14px;padding:3px 12px;font-size:10px;color:rgba(255,255,255,0.5)}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:999;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 18px rgba(0,0,0,0.5);animation:slideUp 0.3s ease;max-width:calc(var(--max-w) - 40px)}
.toast.success{background:#065f46;color:#6ee7b7}.toast.error{background:#7f1d1d;color:#fca5a5}.toast.info{background:var(--bg-card);color:var(--text)}
.fab{position:fixed;bottom:22px;right:calc(50% - var(--max-w)/2 + 16px);width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-dark));border:none;cursor:pointer;box-shadow:0 4px 18px rgba(232,168,124,0.35);display:flex;align-items:center;justify-content:center;z-index:90}
@media(max-width:720px){.fab{right:16px}}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted)}
.empty-state p{font-size:15px}.empty-state .hint{font-size:13px;margin-top:6px}
.pin-list-item{display:flex;align-items:center;gap:10px;padding:9px 10px;margin-bottom:4px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);cursor:pointer;transition:all 0.2s}
.pin-list-item:active{background:var(--bg-hover)}
.footer-credit{text-align:center;font-size:10px;color:var(--text-dim);padding:10px;border-top:1px solid var(--border)}
.map-tooltip{background:rgba(10,10,15,0.9)!important;border:1px solid var(--accent)!important;color:var(--text)!important;font-family:'Noto Sans KR',sans-serif!important;font-size:11px!important;border-radius:6px!important;padding:4px 8px!important;box-shadow:0 2px 8px rgba(0,0,0,0.5)!important}
.map-tooltip::before{border-top-color:rgba(10,10,15,0.9)!important}
.map-count-label{background:none!important;border:none!important;box-shadow:none!important;color:#fff!important;font-weight:700!important;font-size:10px!important}
.leaflet-control-zoom a{background:var(--bg-card)!important;color:var(--text)!important;border-color:var(--border)!important}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes ssFade{0%{opacity:0}100%{opacity:1}}
@media(max-width:480px){.hide-mobile{display:none}}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="header-logo"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div>
      <div><div class="header-title">Travel Journal</div><div class="header-sub" id="headerSub"></div></div>
    </div>
    <div class="header-right">
      <div class="sync-badge idle" id="syncBadge" onclick="doSync()"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg><span id="syncText"></span></div>
      <button class="btn btn-primary" onclick="showAddModal()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="hide-mobile">새 기록</span></button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="filter-bar" id="filterBar" style="display:none"></div>
  <div class="content" id="content"></div>
</div>
<div id="modalContainer"></div>
<div id="toastContainer"></div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbwAQEvwQEAu45ShEyJKjZainLeu1TOXqxTI-4JkjrMCcjBjDxjZSQyXxWzSp4NuenIC/exec";
let state={entries:[],tab:'gallery',search:'',filterTag:'',filterTrip:'',favOnly:false};
const CACHE='tj_cache_v5';
const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DAYS=['일','월','화','수','목','금','토'];
const fmtDate=d=>{if(!d)return'';const dt=new Date(d);return`${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`};
const genId=()=>Date.now().toString(36)+Math.random().toString(36).substr(2,5);
const cacheLocal=()=>{try{localStorage.setItem(CACHE,JSON.stringify(state.entries))}catch{}};
const loadCache=()=>{try{return JSON.parse(localStorage.getItem(CACHE))}catch{return null}};
function icon(n,s=16,c='currentColor'){const d={pin:`<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>`,heart:`<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>`,heartFill:`<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="${c}"/>`,play:`<polygon points="5 3 19 12 5 21 5 3"/>`,pause:`<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>`,x:`<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`,chevL:`<polyline points="15 18 9 12 15 6"/>`,chevR:`<polyline points="9 18 15 12 9 6"/>`,upload:`<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>`,search:`<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>`,trash:`<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>`,music:`<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>`,folder:`<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>`,grid:`<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>`,map:`<path d="M9 2L3 5v16l6-3 6 3 6-3V2l-6 3-6-3zm0 3.5v12m6-9v12"/>`,calendar:`<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>`,clock:`<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>`,stats:`<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>`,globe:`<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>`,image:`<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>`,sync:`<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>`,check:`<polyline points="20 6 9 17 4 12"/>`};return`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${d[n]||''}</svg>`}

const API={
  async getAll(){try{const r=await fetch(API_URL+'?action=getAll');const d=await r.json();return d.success?d.entries:null}catch{return null}},
  async add(e){try{const r=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'add',entry:e})});return await r.json()}catch{return null}},
  async del(id){try{await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'delete',id})})}catch{}},
  async fav(id){try{await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'toggleFavorite',id})})}catch{}},
  async upload(b64,fn,dt){try{const r=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'uploadPhoto',base64:b64,fileName:fn,date:dt,mimeType:'image/jpeg'})});return await r.json()}catch{return null}},
  async uploadMusic(b64,fn){try{const r=await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'uploadMusic',base64:b64,fileName:fn,mimeType:'audio/mpeg'})});return await r.json()}catch{return null}},
};

function showToast(m,t='info'){const c=document.getElementById('toastContainer');c.innerHTML=`<div class="toast ${t}">${m}</div>`;setTimeout(()=>c.innerHTML='',3000)}
function updateSync(s){const b=document.getElementById('syncBadge'),t=document.getElementById('syncText');if(!b)return;b.className='sync-badge '+s;t.textContent={idle:'',syncing:'동기화...',synced:'완료',error:'오류'}[s]||''}
async function doSync(){updateSync('syncing');const d=await API.getAll();if(d){state.entries=d;cacheLocal();updateSync('synced');showToast('동기화 완료!','success');render()}else{updateSync('error');showToast('동기화 실패','error')}}

function getFiltered(){return state.entries.filter(e=>{if(state.favOnly&&!e.favorite)return false;if(state.filterTag&&!(e.tags||[]).includes(state.filterTag))return false;if(state.filterTrip&&e.tripGroup!==state.filterTrip)return false;if(state.search){const s=state.search.toLowerCase();return(e.location||'').toLowerCase().includes(s)||(e.memo||'').toLowerCase().includes(s)||(e.tags||[]).some(t=>t.toLowerCase().includes(s))||(e.country||'').toLowerCase().includes(s)||(e.tripGroup||'').toLowerCase().includes(s)}return true}).sort((a,b)=>new Date(b.date)-new Date(a.date))}
function getAllTags(){const t=new Set();state.entries.forEach(e=>(e.tags||[]).forEach(x=>t.add(x)));return[...t].sort()}
function getAllTrips(){const t=new Set();state.entries.forEach(e=>{if(e.tripGroup)t.add(e.tripGroup)});return[...t].sort()}
function getStats(){const co=new Set(),ci=new Set();let p=0;state.entries.forEach(e=>{if(e.country)co.add(e.country);if(e.location)ci.add(e.location);p+=(e.photos||[]).length});return{countries:co.size,cities:ci.size,photos:p}}

async function addEntry(entry){const n={...entry,id:genId()};updateSync('syncing');const res=await API.add(n);if(res?.success){state.entries.push(n);cacheLocal();updateSync('synced');showToast('Drive에 저장 완료!','success')}else{state.entries.push(n);cacheLocal();updateSync('error');showToast('클라우드 저장 실패','error')}closeModal();render()}
async function deleteEntry(id){if(!confirm('삭제할까요?'))return;state.entries=state.entries.filter(e=>e.id!==id);cacheLocal();closeModal();render();showToast('삭제 완료');await API.del(id)}
async function toggleFav(id,ev){if(ev)ev.stopPropagation();const e=state.entries.find(x=>x.id===id);if(e){e.favorite=!e.favorite;cacheLocal();render()}await API.fav(id)}

const TABS=[{id:'gallery',icon:'grid',label:'갤러리'},{id:'trips',icon:'folder',label:'여행별'},{id:'map',icon:'map',label:'지도'},{id:'calendar',icon:'calendar',label:'캘린더'},{id:'timeline',icon:'clock',label:'타임라인'},{id:'stats',icon:'stats',label:'통계'}];
function renderTabs(){document.getElementById('tabs').innerHTML=TABS.map(t=>`<button class="tab-btn ${state.tab===t.id?'active':''}" onclick="switchTab('${t.id}')">${icon(t.icon,13)} ${t.label}</button>`).join('')}
function switchTab(id){state.tab=id;render()}
function renderFilterBar(){const bar=document.getElementById('filterBar');const show=['gallery','timeline','trips'].includes(state.tab);bar.style.display=show?'flex':'none';if(!show)return;const tags=getAllTags(),trips=getAllTrips();bar.innerHTML=`<div class="search-box">${icon('search',14,'var(--text-muted)')}<input value="${state.search}" oninput="state.search=this.value;renderContent()" placeholder="검색...">${state.search?`<button class="btn btn-ghost" onclick="state.search='';render()" style="padding:2px">${icon('x',12,'var(--text-muted)')}</button>`:''}</div><button class="filter-btn ${state.favOnly?'active':''}" onclick="state.favOnly=!state.favOnly;render()">${icon(state.favOnly?'heartFill':'heart',12,state.favOnly?'var(--accent)':'var(--text-muted)')} ♥</button>${tags.length?`<select class="filter-select" onchange="state.filterTag=this.value;render()"><option value="">태그</option>${tags.map(t=>`<option value="${t}" ${state.filterTag===t?'selected':''}>${t}</option>`).join('')}</select>`:''}${trips.length?`<select class="filter-select" onchange="state.filterTrip=this.value;render()"><option value="">여행</option>${trips.map(t=>`<option value="${t}" ${state.filterTrip===t?'selected':''}>${t}</option>`).join('')}</select>`:''}`}
function renderContent(){const el=document.getElementById('content');switch(state.tab){case'gallery':el.innerHTML=renderGallery();break;case'trips':el.innerHTML=renderTrips();break;case'map':el.innerHTML=renderMap();break;case'calendar':el.innerHTML=renderCalendar();break;case'timeline':el.innerHTML=renderTimeline();break;case'stats':el.innerHTML=renderStatsView();break}}
function updateHeaderSub(){const s=getStats();document.getElementById('headerSub').textContent=`${s.countries}개국 · ${s.cities}개 도시 · ${s.photos}장`}
function render(){renderTabs();renderFilterBar();renderContent();updateHeaderSub()}

// ─── Gallery ────────────────────────────────────────────────────
function renderGallery(){const es=getFiltered();if(!es.length)return`<div class="empty-state">${icon('image',40,'var(--text-dim)')}<p>기록이 없습니다</p><p class="hint">새 기록을 추가해보세요!</p></div>`;return`<div class="gallery-grid">${es.map((e,i)=>`<div class="card" style="animation-delay:${i*0.03}s" onclick="showDetail('${e.id}')"><div class="card-img-wrap"><img class="card-img" src="${e.photos?.[0]||''}" alt="" loading="lazy" onerror="this.style.display='none'">${(e.photos||[]).length>1?`<div class="card-photo-count">📷${e.photos.length}</div>`:''}<button class="card-fav-btn" onclick="toggleFav('${e.id}',event)">${icon(e.favorite?'heartFill':'heart',13,e.favorite?'#ef4444':'#fff')}</button>${e.tripGroup?`<div class="card-trip-badge">📁${e.tripGroup}</div>`:''}${e.music?`<div class="card-music-badge">🎵</div>`:''}</div><div class="card-body"><div class="card-location">${icon('pin',11,'var(--accent)')} ${e.location||''}</div><div class="card-date">${fmtDate(e.date)}</div>${e.memo?`<div class="card-memo">${e.memo}</div>`:''}${(e.tags||[]).length?`<div class="card-tags">${e.tags.slice(0,3).map(t=>`<span class="tag">#${t}</span>`).join('')}</div>`:''}</div></div>`).join('')}</div>${es.length?`<button class="fab" onclick="startSlideshow()">${icon('play',20,'#fff')}</button>`:''}`}

// ─── Trips ──────────────────────────────────────────────────────
let openTrip=null;
function renderTrips(){const es=getFiltered();const groups={};es.forEach(e=>{const k=e.tripGroup||'미분류';if(!groups[k])groups[k]={n:k,es:[],cs:new Set(),p:0};groups[k].es.push(e);if(e.country)groups[k].cs.add(e.country);groups[k].p+=(e.photos||[]).length});const sorted=Object.values(groups).sort((a,b)=>Math.max(...b.es.map(e=>new Date(e.date)))-Math.max(...a.es.map(e=>new Date(e.date))));return sorted.map(g=>{const o=openTrip===g.n;const cover=g.es[0]?.photos?.[0];const dr=g.es.length?`${fmtDate(g.es[g.es.length-1].date)} ~ ${fmtDate(g.es[0].date)}`:'';return`<div class="trip-card ${o?'open':''}" onclick="openTrip=openTrip==='${g.n}'?null:'${g.n}';render()"><div class="trip-cover">${cover?`<img src="${cover}">`:''}</div><div style="flex:1;min-width:0"><div class="trip-name">${icon('folder',14,'var(--accent)')} ${g.n}</div><div class="trip-date">${dr}</div><div class="trip-stats"><span>📍${g.es.length}개</span><span>📷${g.p}장</span><span>🌍${g.cs.size}개국</span></div></div><button class="btn btn-ghost" onclick="event.stopPropagation();startSlideshowGroup('${g.n}')" style="padding:5px">${icon('play',15,'var(--accent)')}</button><span style="transition:transform 0.2s;display:inline-block;transform:${o?'rotate(90deg)':'rotate(0)'}">${icon('chevR',16,'var(--text-dim)')}</span></div>${o?`<div class="trip-entries-grid">${g.es.sort((a,b)=>new Date(a.date)-new Date(b.date)).map(e=>`<div class="trip-entry-card" onclick="event.stopPropagation();showDetail('${e.id}')"><div class="img-wrap"><img src="${e.photos?.[0]||''}" loading="lazy" onerror="this.style.display='none'"></div><div class="info"><p>${(e.location||'').split(',')[0]}</p><p>${fmtDate(e.date)}</p></div></div>`).join('')}</div>`:''}`}).join('')}

// ─── Map ────────────────────────────────────────────────────────
let mapSearch='';let leafletMap=null;
function renderMap(){const groups={};state.entries.forEach(e=>{if(!e.lat||!e.lng)return;const k=`${(+e.lat).toFixed(1)},${(+e.lng).toFixed(1)}`;if(!groups[k])groups[k]={lat:+e.lat,lng:+e.lng,loc:e.location,es:[]};groups[k].es.push(e)});const gs=Object.values(groups);const fg=mapSearch?gs.filter(g=>(g.loc||'').toLowerCase().includes(mapSearch.toLowerCase())):gs;
const locList=fg.sort((a,b)=>b.es.length-a.es.length).map(g=>`<div class="location-item" onclick="${g.es.length===1?`showDetail('${g.es[0].id}')`:`showPinList('${g.loc.replace(/'/g,"\\'")}')`}"><div class="location-thumb"><img src="${g.es[0].photos?.[0]||''}" onerror="this.style.display='none'"></div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${g.loc}</div><div style="font-size:11px;color:var(--text-muted)">${g.es.length}개</div></div>${icon('chevR',14,'var(--text-dim)')}</div>`).join('');
const html=`<div style="margin-top:8px"><div class="search-box" style="margin-bottom:10px">${icon('search',14,'var(--text-muted)')}<input value="${mapSearch}" oninput="mapSearch=this.value;renderContent()" placeholder="장소 검색..."></div><div class="map-container" id="leafletMap"></div><div class="map-legend">📍 ${gs.length}곳</div><div style="margin-top:14px"><h3 style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text-muted)">방문 장소</h3><div class="location-list">${locList}</div></div></div>`;
// Init Leaflet after DOM update
setTimeout(()=>{
  const mapEl=document.getElementById('leafletMap');
  if(!mapEl)return;
  if(leafletMap){leafletMap.remove();leafletMap=null}
  leafletMap=L.map('leafletMap',{zoomControl:false,attributionControl:false}).setView([30,10],2);
  L.control.zoom({position:'bottomright'}).addTo(leafletMap);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:18,subdomains:'abcd'}).addTo(leafletMap);
  // Add pins
  const bounds=[];
  fg.forEach(g=>{
    const m=L.circleMarker([g.lat,g.lng],{radius:Math.min(6+g.es.length*2,14),fillColor:'#e8a87c',fillOpacity:0.9,color:'#fff',weight:2}).addTo(leafletMap);
    m.bindTooltip(`<b>${g.loc}</b><br>${g.es.length}개 기록`,{className:'map-tooltip'});
    m.on('click',()=>{if(g.es.length===1)showDetail(g.es[0].id);else showPinList(g.loc)});
    bounds.push([g.lat,g.lng]);
    if(g.es.length>1){m.bindTooltip(String(g.es.length),{permanent:true,direction:'center',className:'map-count-label'})}
  });
  if(bounds.length>0)leafletMap.fitBounds(bounds,{padding:[30,30],maxZoom:6});
},50);
return html}

// ─── Calendar ───────────────────────────────────────────────────
let calDate=new Date();
function renderCalendar(){const yr=calDate.getFullYear(),mo=calDate.getMonth(),dim=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay();const byDate={};state.entries.forEach(e=>{const d=new Date(e.date);if(d.getFullYear()===yr&&d.getMonth()===mo){const k=d.getDate();if(!byDate[k])byDate[k]=[];byDate[k].push(e)}});const today=new Date();let cells='';for(let i=0;i<fd;i++)cells+=`<div class="cal-day empty"></div>`;for(let d=1;d<=dim;d++){const de=byDate[d];const has=de&&de.length>0;const td=yr===today.getFullYear()&&mo===today.getMonth()&&d===today.getDate();cells+=`<div class="cal-day ${td?'today':''} ${has?'has-entry':''}" ${has&&de.length===1?`onclick="showDetail('${de[0].id}')"`:''}>` +`<span class="cal-day-num">${d}</span>`+(has?de.slice(0,1).map(e=>`<div class="cal-day-entry" onclick="event.stopPropagation();showDetail('${e.id}')">📍${(e.location||'').split(',')[0]}</div>`).join('')+(de.length>1?`<span style="font-size:8px;color:var(--text-dim)">+${de.length-1}</span>`:''):'')+'</div>'}return`<div><div class="cal-nav"><button class="btn btn-default" onclick="calDate=new Date(${yr},${mo-1},1);render()">${icon('chevL',16)}</button><span class="cal-title">${yr}년 ${MONTHS[mo]}</span><button class="btn btn-default" onclick="calDate=new Date(${yr},${mo+1},1);render()">${icon('chevR',16)}</button></div><div class="cal-grid">${DAYS.map(d=>`<div class="cal-header">${d}</div>`).join('')}</div><div class="cal-grid">${cells}</div></div>`}

// ─── Timeline ───────────────────────────────────────────────────

function renderStatsView(){const co={},ci={},mo=Array(12).fill(0);let photos=0,fav=0;state.entries.forEach(e=>{if(e.country)co[e.country]=(co[e.country]||0)+1;if(e.location)ci[e.location]=(ci[e.location]||0)+1;mo[new Date(e.date).getMonth()]++;photos+=(e.photos||[]).length;if(e.favorite)fav++});const topCo=Object.entries(co).sort((a,b)=>b[1]-a[1]).slice(0,5);const topCi=Object.entries(ci).sort((a,b)=>b[1]-a[1]).slice(0,5);const mx=Math.max(...mo,1);return`<div style="padding-top:8px"><h2 style="font-size:20px;font-weight:700;margin-bottom:16px;font-family:'Playfair Display',serif">나의 여행 통계</h2><div class="stats-grid"><div class="stat-card"><div style="margin-bottom:6px">${icon('globe',22,'var(--accent)')}</div><div class="stat-val" style="color:var(--accent)">${Object.keys(co).length}</div><div class="stat-label">방문 국가</div></div><div class="stat-card"><div style="margin-bottom:6px">${icon('pin',22,'#60a5fa')}</div><div class="stat-val" style="color:#60a5fa">${Object.keys(ci).length}</div><div class="stat-label">방문 도시</div></div><div class="stat-card"><div style="margin-bottom:6px">${icon('image',22,'#4ade80')}</div><div class="stat-val" style="color:#4ade80">${photos}</div><div class="stat-label">총 사진</div></div><div class="stat-card"><div style="margin-bottom:6px">${icon('heart',22,'#ef4444')}</div><div class="stat-val" style="color:#ef4444">${fav}</div><div class="stat-label">즐겨찾기</div></div></div><div class="chart-container"><h3 style="font-size:13px;font-weight:600;margin-bottom:14px">월별 기록</h3><div class="chart-bars">${mo.map((c,i)=>`<div class="chart-bar-wrap">${c>0?`<div class="chart-bar-val">${c}</div>`:''}<div class="chart-bar ${c?'':'empty'}" style="height:${Math.max((c/mx)*70,c?6:2)}px"></div><div class="chart-bar-label">${MONTHS[i].replace('월','')}</div></div>`).join('')}</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="rank-list"><h3 style="font-size:13px;font-weight:600;margin-bottom:10px">Top 국가</h3>${topCo.map(( function detailNavPhoto(dir){const e=state.entries.find(x=>x.id===detailEntryId);if(!e)return;const ps=e.photos||[];detailPhotoIdx=(detailPhotoIdx+dir+ps.length)%ps.length;detailUpdatePhoto(ps)}
function detailGoPhoto(i){const e=state.entries.find(x=>x.id===detailEntryId);if(!e)return;detailPhotoIdx=i;detailUpdatePhoto(e.photos||[])}
function detailUpdatePhoto(ps){

function toggleFavDetail(){const e=state.entries.find(x=>x.id===detailEntryId);if(!e)return;e.favorite=!e.favorite;cacheLocal();const btn=document.getElementById('detailFavBtn');if(btn)btn.innerHTML=icon(e.favorite?'heartFill':'heart',22,e.favorite?'#ef4444':'var(--text-dim)');render();API.fav(e.id)}

let addPhotos=[];let addMusicData=null;let locSearchTimer=null;
function showAddModal(){addPhotos=[];addMusicData=null;const trips=getAllTrips();document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay"><div class="modal"><div class="modal-header"><h2>새 여행 기록</h2><button class="btn btn-ghost" onclick="closeModal()">${icon('x',18,'var(--text-muted)')}</button></div><div class="modal-body"><div class="form-group"><label class="form-label">📸 사진 (Google Drive 저장)</label><input type="file" id="photoInput" multiple accept="image/*" style="display:none" onchange="handlePhotoUpload(this)"><button class="upload-zone" onclick="document.getElementById('photoInput').click()">${icon('upload',20,'var(--text-muted)')}사진 선택 또는 촬영</button><div class="photo-previews" id="photoPreviews"></div></div><div class="form-group"><label class="form-label">📍 장소 검색</label><input id="locSearch" class="form-input" placeholder="도시, 장소 이름으로 검색..." oninput="searchLocation(this.value)" autocomplete="off"><div class="loc-results" id="locResults"></div><input type="hidden" id="entryLat"><input type="hidden" id="entryLng"><div id="selectedLoc" style="font-size:11px;color:var(--accent);margin-top:4px;display:none"></div></div><div class="form-row"><div class="form-group"><label class="form-label">📅 날짜</label><input id="entryDate" type="date" class="form-input" value="${new Date().toISOString().split('T')[0]}"></div><div class="form-group"><label class="form-label">🌍 국가</label><input id="entryCountry" class="form-input" placeholder="자동 입력됨"></div></div><div class="form-group"><label class="form-label">📍 장소 표시명</label><input id="entryLocation" class="form-input" placeholder="Tokyo, Japan (자동 입력됨)"></div><div class="form-group"><label class="form-label">📁 여행 그룹</label><div style="display:flex;gap:6px">${trips.length?`<select id="tripSelect" class="form-input" style="flex:1" onchange="document.getElementById('newTrip').value=''"><option value="">기존 선택</option>${trips.map(t=>`<option value="${t}">${t}</option>`).join('')}</select>`:''}<input id="newTrip" class="form-input" style="flex:1" placeholder="새 여행명" ${trips.length?`onchange="document.getElementById('tripSelect').value=''"`:''}/></div></div><div class="form-group"><label class="form-label">📝 메모</label><textarea id="entryMemo" class="form-input" style="min-height:50px;resize:vertical" placeholder="짧은 메모"></textarea></div><div class="form-group"><label class="form-label">🏷️ 태그 (쉼표)</label><input id="entryTags" class="form-input" placeholder="벚꽃, 맛집"></div><div class="form-group"><label class="form-label">🎵 배경음악 (선택, Drive 저장)</label><input type="file" id="musicInput" accept="audio/*" style="display:none" onchange="handleMusicUpload(this)"><button class="upload-zone" onclick="document.getElementById('musicInput').click()" style="padding:12px" id="musicUploadBtn">${icon('music',18,'var(--text-muted)')}음악 파일 선택</button></div><div class="form-group"><label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px"><input type="checkbox" id="entryFav" style="accent-color:var(--accent)"> ❤️ 즐겨찾기</label></div><button class="btn btn-primary" id="submitBtn" style="width:100%;padding:11px 0;font-size:14px;border-radius:9px" onclick="submitEntry()">☁️ Drive에 저장하기</button></div></div></div>`}

// ─── Location Search (OpenStreetMap Nominatim) ──────────────────
function searchLocation(q){clearTimeout(locSearchTimer);if(q.length<2){document.getElementById('locResults').className='loc-results';return}locSearchTimer=setTimeout(async()=>{const el=document.getElementById('locResults');el.innerHTML='<div class="loc-searching">검색 중...</div>';el.className='loc-results show';try{const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=5&accept-language=ko`);const data=await r.json();if(data.length){el.innerHTML=data.map(d=>`<div class="loc-result-item" onclick="selectLocation('${d.display_name.replace(/'/g,"\\'")}',${d.lat},${d.lon})">${d.display_name}</div>`).join('')}else{el.innerHTML='<div class="loc-searching">결과 없음</div>'}}catch{el.innerHTML='<div class="loc-searching">검색 실패</div>'}},400)}

function selectLocation(name,lat,lng){
  // 이름에서 도시, 국가 추출
  const parts=name.split(',').map(s=>s.trim());
  const city=parts[0];
  const country=parts[parts.length-1];
  const locName=parts.length>1?`${city}, ${country}`:city;
  
  document.getElementById('entryLocation').value=locName;
  document.getElementById('entryCountry').value=country;
  document.getElementById('entryLat').value=lat;
  document.getElementById('entryLng').value=lng;
  document.getElementById('selectedLoc').style.display='block';
  document.getElementById('selectedLoc').textContent=`✓ ${locName} (${Number(lat).toFixed(4)}, ${Number(lng).toFixed(4)})`;
  document.getElementById('locResults').className='loc-results';
  document.getElementById('locSearch').value=locName;
}

function handlePhotoUpload(input){Array.from(input.files||[]).forEach(file=>{const reader=new FileReader();reader.onload=e=>{addPhotos.push({data:e.target.result,name:file.name});renderPhotoPreviews()};reader.readAsDataURL(file)});input.value=''}
function renderPhotoPreviews(){const el=document.getElementById('photoPreviews');if(!el)return;el.innerHTML=addPhotos.map((p,i)=>`<div class="photo-preview"><img src="${p.data}"><button class="remove-btn" onclick="addPhotos.splice(${i},1);renderPhotoPreviews()">✕</button></div>`).join('')}

function handleMusicUpload(input){const file=input.files?.[0];if(file){const reader=new FileReader();reader.onload=e=>{addMusicData={data:e.target.result,name:file.name};document.getElementById('musicUploadBtn').innerHTML=`${icon('music',18,'var(--accent)')} 🎵 ${file.name}`};reader.readAsDataURL(file)}}

async function submitEntry(){const loc=document.getElementById('entryLocation').value;const date=document.getElementById('entryDate').value;if(!loc||!date){alert('날짜와 장소 필수!');return}const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='☁️ 업로드 중...';
  let photoList=[];
  for(let i=0;i<addPhotos.length;i++){btn.textContent=`☁️ 사진 ${i+1}/${addPhotos.length} 업로드...`;const r=await API.upload(addPhotos[i].data,addPhotos[i].name,date);if(r?.success)photoList.push(r.url);else showToast('사진 업로드 실패','error')}
  let musicUrl='';
  if(addMusicData){btn.textContent='☁️ 음악 업로드 중...';const mr=await API.uploadMusic(addMusicData.data,addMusicData.name);if(mr?.success)musicUrl=mr.url;else showToast('음악 업로드 실패','error')}
  const tripSel=document.getElementById('tripSelect');const trip=document.getElementById('newTrip').value||(tripSel?tripSel.value:'');
  await addEntry({date,location:loc,country:document.getElementById('entryCountry').value,lat:document.getElementById('entryLat').value?+document.getElementById('entryLat').value:null,lng:document.getElementById('entryLng').value?+document.getElementById('entryLng').value:null,memo:document.getElementById('entryMemo').value,tags:document.getElementById('entryTags').value.split(',').map(t=>t.trim()).filter(Boolean),favorite:document.getElementById('entryFav').checked,tripGroup:trip,photos:photoList,music:musicUrl})}

function showPinList(location){const es=state.entries.filter(e=>e.location===location).sort((a,b)=>new Date(b.date)-new Date(a.date));document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay"><div class="modal" style="max-height:80vh"><div class="modal-header"><h2>📍 ${location} (${es.length})</h2><button class="btn btn-ghost" onclick="closeModal()">${icon('x',16,'var(--text-muted)')}</button></div><div style="padding:10px">${es.map(e=>`<div class="pin-list-item" onclick="closeModal();setTimeout(()=>showDetail('${e.id}'),100)"><div class="location-thumb"><img src="${e.photos?.[0]||''}" onerror="this.style.display='none'"></div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${fmtDate(e.date)}</div>${e.memo?`<div style="font-size:11px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.memo}</div>`:''}${e.tripGroup?`<div style="font-size:10px;color:var(--accent)">📁 ${e.tripGroup}</div>`:''}</div>${e.favorite?icon('heartFill',12,'#ef4444'):''}</div>`).join('')}</div></div></div>`}

// ─── Slideshow (검은화면 페이드 전환) ───────────────────────────
let ssPhotos=[],ssIdx=0,ssPlaying=true,ssDur=5500,ssTimer=null,ssProgressTimer=null,ssAudio=null,ssActive=false;
function startSlideshow(){_startSS(getFiltered())}
function startSlideshowGroup(tn){_startSS(state.entries.filter(e=>e.tripGroup===tn))}
function startSlideshowSingle(id){_startSS(state.entries.filter(e=>e.id===id))}
function _startSS(entries){
  ssPhotos=[];let musicUrl='';
  entries.forEach(e=>{(e.photos||[]).forEach(u=>ssPhotos.push({u,loc:e.location,dt:e.date,memo:e.memo,trip:e.tripGroup}));if(e.music&&!musicUrl)musicUrl=e.music;});
  if(!ssPhotos.length){showToast('사진이 없습니다');return}
  ssIdx=0;ssPlaying=true;ssActive=true;
  ssAudio=new Audio();ssAudio.loop=true;
  // 음악 로드: Drive 파일 ID 추출 → Apps Script 프록시로 base64 스트리밍
  if(musicUrl){
    const idMatch=musicUrl.match(/[?&]id=([^&]+)/);
    if(idMatch){
      fetch(API_URL+'?action=streamMusic&id='+idMatch[1]).then(r=>r.text()).then(b64=>{
        if(!b64.startsWith('ERROR')){ssAudio.src='data:audio/mpeg;base64,'+b64;ssAudio.play().catch(()=>{});}
      }).catch(()=>{});
    }else{ssAudio.src=musicUrl;ssAudio.play().catch(()=>{});}
  }
  // Build slideshow DOM once
  const c=ssPhotos[0];const hasMusic=ssAudio&&ssAudio.src;
  document.getElementById('modalContainer').innerHTML=`<div class="slideshow" id="ssContainer"><div class="slideshow-img-wrap"><img class="slideshow-img" id="ssImg" src="${c.u}"><div class="slideshow-gradient"></div></div><div class="slideshow-progress"><div class="slideshow-progress-bar" id="ssProgressBar"></div></div><div class="slideshow-top"><span class="slideshow-counter" id="ssCounter">1/${ssPhotos.length}</span><button class="btn-icon" onclick="ssClose()">${icon('x',16,'#fff')}</button></div><div class="slideshow-info" id="ssInfo">${c.trip?`<div class="slideshow-trip">📁 ${c.trip}</div>`:''}<div class="slideshow-location">${c.loc}</div><div class="slideshow-date">${fmtDate(c.dt)}</div>${c.memo?`<div class="slideshow-memo">${c.memo}</div>`:''}</div><div class="slideshow-controls"><button class="ss-ctrl-btn" onclick="ssPrev()">${icon('chevL',16,'#fff')}</button><button class="ss-play-btn" id="ssPlayBtn" onclick="ssToggle()">${icon('pause',20,'var(--accent)')}</button><button class="ss-ctrl-btn" onclick="ssNext()">${icon('chevR',16,'#fff')}</button></div>${hasMusic?`<div class="ss-music-label">🎵 음악 재생 중</div>`:''}</div>`;
  ssSchedule();
}
function ssTransition(){
  // Fade out image → black → load new → fade in
  const img=document.getElementById('ssImg');
  const info=document.getElementById('ssInfo');
  if(!img)return;
  img.style.transition='opacity 0.4s ease';
  info.style.transition='opacity 0.3s ease';
  img.style.opacity='0';info.style.opacity='0';
  setTimeout(()=>{
    const c=ssPhotos[ssIdx];
    img.src=c.u;
    document.getElementById('ssCounter').textContent=`${ssIdx+1}/${ssPhotos.length}`;
    info.innerHTML=`${c.trip?`<div class="slideshow-trip">📁 ${c.trip}</div>`:''}<div class="slideshow-location">${c.loc}</div><div class="slideshow-date">${fmtDate(c.dt)}</div>${c.memo?`<div class="slideshow-memo">${c.memo}</div>`:''}`;
    // Wait for image to load then fade in
    img.onload=()=>{img.style.opacity='1';info.style.opacity='1';};
    // Fallback if image cached
    if(img.complete){img.style.opacity='1';info.style.opacity='1';}
  },450);
}
function ssSchedule(){clearTimeout(ssTimer);clearInterval(ssProgressTimer);if(!ssPlaying||!ssActive)return;const start=Date.now();ssProgressTimer=setInterval(()=>{const bar=document.getElementById('ssProgressBar');if(bar)bar.style.width=Math.min((Date.now()-start)/ssDur*100,100)+'%';},30);ssTimer=setTimeout(()=>{ssIdx=(ssIdx+1)%ssPhotos.length;ssTransition();ssSchedule();},ssDur);}
function ssToggle(){ssPlaying=!ssPlaying;const btn=document.getElementById('ssPlayBtn');if(btn)btn.innerHTML=icon(ssPlaying?'pause':'play',20,'var(--accent)');if(ssPlaying){ssSchedule();if(ssAudio?.src)ssAudio.play().catch(()=>{})}else{clearTimeout(ssTimer);clearInterval(ssProgressTimer);ssAudio?.pause();}}
function ssNext(){clearTimeout(ssTimer);clearInterval(ssProgressTimer);ssIdx=(ssIdx+1)%ssPhotos.length;ssTransition();if(ssPlaying)setTimeout(()=>ssSchedule(),500);}
function ssPrev(){clearTimeout(ssTimer);clearInterval(ssProgressTimer);ssIdx=(ssIdx-1+ssPhotos.length)%ssPhotos.length;ssTransition();if(ssPlaying)setTimeout(()=>ssSchedule(),500);}
function ssClose(){ssActive=false;clearTimeout(ssTimer);clearInterval(ssProgressTimer);if(ssAudio){ssAudio.pause();ssAudio=null}document.getElementById('modalContainer').innerHTML='';}

function closeModal(){document.getElementById('modalContainer').innerHTML=''}

async function init(){
  // PWA 서비스워커 등록
  if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
  const cached=loadCache();
  if(cached&&cached.length){state.entries=cached;render()}
  else{document.getElementById('content').innerHTML='<div class="loading-screen"><div class="loading-spinner"></div><p style="font-size:14px;color:var(--text-muted)">클라우드에서 불러오는 중...</p></div>'}
  await doSync();
}
init();
</script>
