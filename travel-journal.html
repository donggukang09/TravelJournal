<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Travel Journal</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f;--bg-card:#14141f;--bg-hover:#1a1a2e;
  --accent:#e8a87c;--accent-dark:#c47a4a;--accent-light:#f5d0b0;
  --text:#e8e6e3;--text-muted:#8a8a9a;--text-dim:#5a5a6a;
  --border:#2a2a3a;--success:#4ade80;--danger:#ef4444;
  --overlay:rgba(0,0,0,0.75);
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans KR','Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
input,select,textarea,button{font-family:inherit}img{-webkit-user-drag:none}

/* ─── Setup Screen ─── */
.setup-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px;text-align:center;animation:fadeIn 0.5s ease}
.setup-logo{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 8px 32px rgba(232,168,124,0.3)}
.setup-title{font-size:24px;font-weight:700;font-family:'Playfair Display',serif;margin-bottom:6px}
.setup-desc{font-size:13px;color:var(--text-muted);margin-bottom:28px;line-height:1.6;max-width:340px}
.setup-box{width:100%;max-width:400px;padding:20px;border-radius:14px;background:var(--bg-card);border:1px solid var(--border);text-align:left}
.setup-box h3{font-size:14px;font-weight:600;margin-bottom:12px}
.setup-step{font-size:11px;color:var(--text-muted);margin-bottom:6px;padding-left:20px;position:relative;line-height:1.5}
.setup-step::before{content:attr(data-num);position:absolute;left:0;color:var(--accent);font-weight:700}
.setup-input{width:100%;padding:10px 12px;border-radius:8px;font-size:12px;background:var(--bg);border:1px solid var(--border);color:var(--text);outline:none;margin:12px 0 6px}
.setup-input:focus{border-color:var(--accent)}
.setup-input.error{border-color:var(--danger);animation:shake 0.3s}
.setup-btn{width:100%;padding:12px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;font-family:inherit;transition:opacity 0.2s}
.setup-btn:disabled{opacity:0.5}
.setup-error{font-size:11px;color:var(--danger);margin-top:4px;display:none}
.setup-skip{font-size:11px;color:var(--text-dim);margin-top:16px;cursor:pointer;text-decoration:underline}

/* ─── App Shell ─── */
#app{display:none;flex-direction:column;height:100%;padding-top:var(--safe-top)}

/* ─── Header ─── */
.header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:100}
.header-left{display:flex;align-items:center;gap:10px}
.header-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));display:flex;align-items:center;justify-content:center}
.header-title{font-size:16px;font-weight:700;letter-spacing:-0.5px}
.header-sub{font-size:10px;color:var(--text-muted);margin-top:1px}
.header-right{display:flex;align-items:center;gap:6px}
.sync-badge{display:flex;align-items:center;gap:3px;padding:3px 7px;border-radius:5px;font-size:9px;cursor:pointer}
.sync-badge.syncing{color:var(--accent)}.sync-badge.synced{color:var(--success)}.sync-badge.error{color:var(--danger)}.sync-badge.idle{color:var(--text-dim)}

/* ─── Buttons ─── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;border:none;cursor:pointer;font-weight:500;font-size:12px;border-radius:7px;transition:all 0.2s;font-family:inherit}
.btn-primary{padding:7px 14px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff}
.btn-default{padding:7px 14px;background:var(--bg-card);color:var(--text);border:1px solid var(--border)}
.btn-ghost{padding:5px 8px;background:none;color:var(--text-muted)}
.btn-danger{padding:7px 14px;background:rgba(239,68,68,0.1);color:var(--danger);border:1px solid rgba(239,68,68,0.2)}
.btn-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.35);border:none;cursor:pointer}

/* ─── Tabs ─── */
.tabs{flex-shrink:0;display:flex;background:rgba(10,10,15,0.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{display:flex;align-items:center;gap:4px;padding:9px 14px;white-space:nowrap;background:none;border:none;cursor:pointer;font-size:11px;font-family:inherit;color:var(--text-muted);border-bottom:2px solid transparent;transition:all 0.2s}
.tab-btn.active{color:var(--accent);font-weight:600;border-bottom-color:var(--accent)}

/* ─── Filter ─── */
.filter-bar{flex-shrink:0;display:flex;gap:5px;padding:8px 14px;flex-wrap:wrap;align-items:center;background:var(--bg)}
.search-box{flex:1;min-width:140px;display:flex;align-items:center;background:var(--bg-card);border-radius:7px;padding:0 9px;border:1px solid var(--border)}
.search-box input{flex:1;padding:8px 7px;background:none;border:none;color:var(--text);font-size:11px;outline:none}
.filter-btn{padding:6px 9px;border-radius:6px;font-size:11px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:3px}
.filter-btn.active{background:rgba(232,168,124,0.12);border-color:var(--accent);color:var(--accent)}
.filter-select{padding:6px 8px;border-radius:6px;font-size:11px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);cursor:pointer;outline:none;font-family:inherit}

/* ─── Content ─── */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 14px 20px;padding-bottom:calc(20px + var(--safe-bottom))}

/* ─── Loading ─── */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── Gallery ─── */
.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding-top:6px}
@media(min-width:768px){.gallery-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}}
.card{border-radius:9px;overflow:hidden;background:var(--bg-card);border:1px solid var(--border);cursor:pointer;transition:all 0.25s;animation:fadeIn 0.3s ease both}
.card:active{transform:scale(0.98)}
@media(hover:hover){.card:hover{transform:translateY(-2px);box-shadow:0 4px 18px rgba(232,168,124,0.1)}}
.card-img-wrap{position:relative;padding-top:70%;overflow:hidden}
.card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:var(--bg-hover)}
.card-photo-count{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.55);border-radius:4px;padding:1px 6px;font-size:9px;color:#fff}
.card-fav-btn{position:absolute;top:5px;left:5px;background:rgba(0,0,0,0.3);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.card-trip-badge{position:absolute;bottom:5px;left:5px;background:rgba(0,0,0,0.55);border-radius:4px;padding:1px 7px;font-size:8px;color:var(--accent-light)}
.card-body{padding:6px 8px}
.card-location{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-date{font-size:9px;color:var(--text-muted);margin-top:1px}
.card-memo{font-size:10px;color:var(--text-muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-tags{display:flex;gap:2px;margin-top:4px;flex-wrap:wrap}
.tag{font-size:8px;padding:0 5px;border-radius:6px;background:rgba(232,168,124,0.1);color:var(--accent)}

/* ─── Trips ─── */
.trip-card{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;cursor:pointer;background:var(--bg-card);border:1px solid var(--border);transition:all 0.2s;margin-bottom:8px}
.trip-card.open{border-color:rgba(232,168,124,0.3)}
.trip-cover{width:56px;height:56px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--bg-hover)}
.trip-cover img{width:100%;height:100%;object-fit:cover}
.trip-name{font-size:14px;font-weight:700;margin-bottom:2px}
.trip-date{font-size:10px;color:var(--text-muted)}
.trip-stats{display:flex;gap:10px;margin-top:3px;font-size:10px;color:var(--text-dim)}
.trip-entries-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:6px;animation:fadeIn 0.3s ease}
@media(min-width:768px){.trip-entries-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));padding-left:16px}}
.trip-entry-card{border-radius:7px;overflow:hidden;background:var(--bg-hover);border:1px solid var(--border);cursor:pointer}
.trip-entry-card .img-wrap{position:relative;padding-top:60%}
.trip-entry-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.trip-entry-card .info{padding:5px 7px}
.trip-entry-card .info p:first-child{font-size:10px;font-weight:600}
.trip-entry-card .info p:last-child{font-size:9px;color:var(--text-muted)}

/* ─── Map ─── */
.map-container{border-radius:12px;overflow:hidden;border:1px solid var(--border);background:#0a1628;position:relative;margin-top:8px}
.map-container svg{width:100%;display:block}
.map-legend{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.6);border-radius:6px;padding:4px 8px;font-size:9px;color:var(--text-muted)}
.location-list{display:grid;grid-template-columns:1fr;gap:5px;margin-top:12px}
@media(min-width:768px){.location-list{grid-template-columns:repeat(2,1fr)}}
.location-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;background:var(--bg-card);border:1px solid var(--border);cursor:pointer;transition:all 0.2s}
.location-item:active{background:var(--bg-hover)}
.location-thumb{width:34px;height:34px;border-radius:6px;overflow:hidden;flex-shrink:0}
.location-thumb img{width:100%;height:100%;object-fit:cover}

/* ─── Calendar ─── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin:12px 0 16px}
.cal-title{font-size:17px;font-weight:700;font-family:'Playfair Display',serif}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-header{text-align:center;font-size:10px;font-weight:600;color:var(--text-muted);padding:5px 0}
.cal-day{min-height:44px;border-radius:5px;background:var(--bg-card);border:1px solid var(--border);padding:2px 3px;font-size:9px}
@media(min-width:768px){.cal-day{min-height:68px;padding:4px 5px;font-size:10px}}
.cal-day.empty{background:transparent;border:none}
.cal-day.today{border-color:var(--accent)}
.cal-day.has-entry{background:rgba(232,168,124,0.05);border-color:rgba(232,168,124,0.2);cursor:pointer}
.cal-day.today .cal-day-num{font-weight:700;color:var(--accent)}
.cal-day-entry{font-size:7px;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4;cursor:pointer}

/* ─── Timeline ─── */
.tl-year{font-size:24px;font-weight:700;color:var(--accent);font-family:'Playfair Display',serif}
.tl-line{position:relative;padding-left:18px}
.tl-line::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,rgba(232,168,124,0.3),transparent)}
.tl-item{position:relative;margin-bottom:10px;cursor:pointer;animation:fadeIn 0.3s ease both}
.tl-dot{position:absolute;left:-16px;top:10px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.tl-card{padding:9px 10px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);transition:all 0.2s}
.tl-card:active{background:var(--bg-hover)}
.tl-photos{display:flex;gap:3px;margin-top:6px;overflow-x:auto;padding-bottom:1px}
.tl-photos img{width:48px;height:48px;border-radius:5px;object-fit:cover;flex-shrink:0}

/* ─── Stats ─── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
@media(min-width:768px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{padding:14px;border-radius:9px;text-align:center;background:var(--bg-card);border:1px solid var(--border)}
.stat-val{font-size:22px;font-weight:700;font-family:'Playfair Display',serif}
.stat-label{font-size:10px;color:var(--text-muted);margin-top:2px}
.chart-container{padding:16px;border-radius:9px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:12px}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:80px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center}
.chart-bar{width:100%;max-width:30px;border-radius:2px;background:linear-gradient(to top,var(--accent-dark),var(--accent));transition:height 0.5s}
.chart-bar.empty{background:var(--border)}
.chart-bar-label{font-size:7px;color:var(--text-dim);margin-top:2px}
.chart-bar-val{font-size:8px;color:var(--text-muted);margin-bottom:2px}
.rank-list{padding:14px;border-radius:9px;background:var(--bg-card);border:1px solid var(--border)}
.rank-item{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.rank-num{font-size:11px;font-weight:600;width:16px}
.rank-name{flex:1;font-size:11px}
.rank-count{font-size:10px;color:var(--text-muted)}

/* ─── Modal ─── */
.modal-overlay{position:fixed;inset:0;z-index:200;background:var(--overlay);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn 0.25s ease}
@media(min-width:768px){.modal-overlay{align-items:center;padding:16px}}
.modal{width:100%;max-height:95vh;overflow-y:auto;background:var(--bg);border-radius:16px 16px 0 0;animation:slideUp 0.3s ease;-webkit-overflow-scrolling:touch}
@media(min-width:768px){.modal{max-width:500px;border-radius:14px;max-height:90vh;border:1px solid var(--border)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
.modal-header h2{font-size:15px;font-weight:700}
.modal-body{padding:16px}

/* ─── Detail ─── */
.detail-photo-wrap{position:relative}
.detail-photo{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.detail-nav-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.4);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.detail-nav-btn.left{left:6px}.detail-nav-btn.right{right:6px}
.detail-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.detail-dot{height:6px;border-radius:3px;border:none;cursor:pointer;transition:all 0.3s}
.detail-dot.active{width:16px;background:var(--accent)}.detail-dot.inactive{width:6px;background:rgba(255,255,255,0.4)}
.detail-content{padding:16px}
.detail-title{font-size:16px;font-weight:700;font-family:'Playfair Display',serif}
.detail-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
.detail-memo{font-size:12px;margin-top:12px;line-height:1.7}
.detail-tags{display:flex;gap:4px;margin-top:12px;flex-wrap:wrap}
.detail-tag{font-size:10px;padding:2px 9px;border-radius:14px;background:rgba(232,168,124,0.1);color:var(--accent)}
.detail-thumbs{display:flex;gap:4px;margin-top:12px;overflow-x:auto}
.detail-thumb{width:42px;height:42px;border-radius:5px;object-fit:cover;flex-shrink:0;cursor:pointer;transition:all 0.2s}
.detail-thumb.active{border:2px solid var(--accent);opacity:1}.detail-thumb.inactive{border:2px solid transparent;opacity:0.45}
.detail-actions{display:flex;gap:6px;margin-top:18px;border-top:1px solid var(--border);padding-top:12px}

/* ─── Form ─── */
.form-group{margin-bottom:12px}
.form-label{font-size:10px;font-weight:600;color:var(--text-muted);margin-bottom:2px;display:block}
.form-input{width:100%;padding:8px 10px;border-radius:6px;font-size:11px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);outline:none;font-family:inherit}
.form-input:focus{border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.upload-zone{width:100%;padding:16px;border-radius:7px;background:var(--bg-card);border:2px dashed var(--border);color:var(--text-muted);font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all 0.2s;font-family:inherit}
.upload-zone:active{border-color:var(--accent)}
.photo-previews{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.photo-preview{position:relative}
.photo-preview img{width:46px;height:46px;border-radius:5px;object-fit:cover}
.photo-preview .remove-btn{position:absolute;top:-2px;right:-2px;width:14px;height:14px;border-radius:50%;background:var(--danger);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff}

/* ─── Slideshow ─── */
.slideshow{position:fixed;inset:0;z-index:300;background:#000;animation:fadeIn 0.4s ease}
.slideshow-img-wrap{position:absolute;inset:0;overflow:hidden}
.slideshow-img{width:100%;height:100%;object-fit:cover;animation:kenburns 4.5s ease-in-out}
.slideshow-gradient{position:absolute;inset:0;background:linear-gradient(transparent 35%,rgba(0,0,0,0.85))}
.slideshow-progress{position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.08);z-index:10}
.slideshow-progress-bar{height:100%;background:var(--accent)}
.slideshow-top{position:absolute;top:8px;left:8px;right:8px;z-index:10;display:flex;justify-content:space-between;align-items:center}
.slideshow-counter{color:rgba(255,255,255,0.5);font-size:10px}
.slideshow-info{position:absolute;bottom:0;left:0;right:0;padding:24px 16px 80px;z-index:10}
.slideshow-trip{font-size:11px;color:var(--accent-light);margin-bottom:3px;opacity:0.7}
.slideshow-location{font-size:20px;font-weight:700;color:#fff;font-family:'Playfair Display',serif;text-shadow:0 2px 6px rgba(0,0,0,0.5)}
.slideshow-date{font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px}
.slideshow-memo{font-size:12px;color:rgba(255,255,255,0.7);margin-top:5px;line-height:1.5;max-width:400px}
.slideshow-controls{position:absolute;bottom:22px;left:0;right:0;display:flex;justify-content:center;align-items:center;gap:12px;z-index:10}
.ss-ctrl-btn{background:rgba(0,0,0,0.3);border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ss-play-btn{background:rgba(232,168,124,0.2);border:2px solid var(--accent);border-radius:50%;width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ss-music-label{position:absolute;bottom:58px;left:50%;transform:translateX(-50%);z-index:10;background:rgba(0,0,0,0.4);border-radius:14px;padding:2px 10px;font-size:9px;color:rgba(255,255,255,0.5)}

/* ─── Settings ─── */
.settings-section{padding:12px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);margin-bottom:12px}
.settings-section h4{font-size:12px;font-weight:600;margin-bottom:8px}
.settings-hint{font-size:9px;color:var(--text-dim);margin-top:5px;line-height:1.4}

/* ─── Toast ─── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:999;padding:9px 18px;border-radius:9px;font-size:12px;font-weight:500;box-shadow:0 4px 18px rgba(0,0,0,0.5);animation:slideUp 0.3s ease}
.toast.success{background:#065f46;color:#6ee7b7}.toast.error{background:#7f1d1d;color:#fca5a5}.toast.info{background:var(--bg-card);color:var(--text)}

/* ─── FAB ─── */
.fab{position:fixed;bottom:20px;right:16px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-dark));border:none;cursor:pointer;box-shadow:0 4px 18px rgba(232,168,124,0.35);display:flex;align-items:center;justify-content:center;z-index:90}

/* ─── Empty ─── */
.empty-state{text-align:center;padding:44px 16px;color:var(--text-muted)}
.empty-state p{font-size:14px}.empty-state .hint{font-size:12px;margin-top:4px}

/* ─── Pin List ─── */
.pin-list-item{display:flex;align-items:center;gap:9px;padding:8px 9px;margin-bottom:3px;border-radius:7px;background:var(--bg-card);border:1px solid var(--border);cursor:pointer;transition:all 0.2s}
.pin-list-item:active{background:var(--bg-hover)}

.footer-credit{text-align:center;font-size:9px;color:var(--text-dim);padding:8px;border-top:1px solid var(--border)}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}
@keyframes kenburns{0%{transform:scale(1)}50%{transform:scale(1.1) translate(-1%,-0.5%)}100%{transform:scale(1.05) translate(0.5%,-1%)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@media(max-width:480px){.hide-mobile{display:none}}
</style>
</head>
<body>

<!-- ═══ SETUP SCREEN (초기 설정) ═══ -->
<div id="setupScreen" class="setup-screen">
  <div class="setup-logo">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
  </div>
  <div class="setup-title">Travel Journal</div>
  <div class="setup-desc">
    여행 기록을 평생 간직하세요.<br>
    어떤 기기에서든 동일한 기록을 볼 수 있도록<br>
    <strong style="color:var(--accent)">Google Drive에 안전하게 저장</strong>됩니다.
  </div>
  <div class="setup-box">
    <h3>🔗 Apps Script 연결</h3>
    <div class="setup-step" data-num="1.">Google Sheets에 스프레드시트를 생성하세요</div>
    <div class="setup-step" data-num="2.">Google Drive에 TravelJournal 폴더를 생성하세요</div>
    <div class="setup-step" data-num="3.">Apps Script에 백엔드 코드를 배포하세요</div>

    <div id="setupError" class="setup-error">연결에 실패했습니다. URL을 확인해주세요.</div>
    <button id="setupBtn" class="setup-btn" onclick="connectAndStart()">연결하고 시작하기</button>
  </div>
  <div class="footer-credit" style="margin-top:24px;border:none">DEVELOPED BY DONGGU KANG</div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>

      </div>
    </div>
    <div class="header-right">
      <div class="sync-badge idle" id="syncBadge" onclick="doSync()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>

        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button class="btn btn-primary" onclick="showAddModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span class="hide-mobile">새 기록</span>
      </button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="filter-bar" id="filterBar" style="display:none"></div>
  <div class="content" id="content"></div>
</div>

<div id="modalContainer"></div>
<div id="toastContainer"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// TRAVEL JOURNAL - Cloud-First Edition
// DEVELOPED BY DONGGU KANG
// ═══════════════════════════════════════════════════════════════

const CONFIG = {
  get URL() { try { return JSON.parse(localStorage.getItem('tj_cfg'))?.u || ''; } catch { return ''; } },
  set URL(v) { const c = CONFIG._load(); c.u = v; localStorage.setItem('tj_cfg', JSON.stringify(c)); },
  get MAPS() { try { return JSON.parse(localStorage.getItem('tj_cfg'))?.m || ''; } catch { return ''; } },
  set MAPS(v) { const c = CONFIG._load(); c.m = v; localStorage.setItem('tj_cfg', JSON.stringify(c)); },
  _load() { try { return JSON.parse(localStorage.getItem('tj_cfg')) || {}; } catch { return {}; } },
};

let state = { entries: [], tab: 'gallery', search: '', filterTag: '', filterTrip: '', favOnly: false };
const CACHE_KEY = 'tj_cache_v4';
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DAYS = ['일','월','화','수','목','금','토'];
const fmtDate = d => { if(!d)return''; const dt=new Date(d); return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`; };
const genId = () => Date.now().toString(36)+Math.random().toString(36).substr(2,5);
const cacheLocal = () => { try { localStorage.setItem(CACHE_KEY, JSON.stringify(state.entries)); } catch{} };
const loadCache = () => { try { return JSON.parse(localStorage.getItem(CACHE_KEY)); } catch { return null; } };

function icon(name, size=16, color='currentColor') {
  const d={
    pin:`<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>`,
    heart:`<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>`,
    heartFill:`<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="${color}"/>`,
    play:`<polygon points="5 3 19 12 5 21 5 3"/>`,pause:`<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>`,
    x:`<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`,
    chevL:`<polyline points="15 18 9 12 15 6"/>`,chevR:`<polyline points="9 18 15 12 9 6"/>`,
    upload:`<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>`,
    search:`<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>`,
    trash:`<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>`,
    music:`<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>`,
    folder:`<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>`,
    grid:`<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>`,
    map:`<path d="M9 2L3 5v16l6-3 6 3 6-3V2l-6 3-6-3zm0 3.5v12m6-9v12"/>`,
    calendar:`<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>`,
    clock:`<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>`,
    stats:`<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>`,
    globe:`<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>`,
    image:`<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>`,
    cloud:`<path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>`,
    sync:`<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>`,
    check:`<polyline points="20 6 9 17 4 12"/>`,
  };
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${d[name]||''}</svg>`;
}

// ─── API (Cloud-First) ─────────────────────────────────────────
const API = {
  async test(url) { try { const r=await fetch(url+'?action=getAll'); const d=await r.json(); return d.success; } catch { return false; } },
  async getAll() { try { const r=await fetch(CONFIG.URL+'?action=getAll'); const d=await r.json(); return d.success?d.entries:null; } catch { return null; } },
  async add(e) { try { const r=await fetch(CONFIG.URL,{method:'POST',body:JSON.stringify({action:'add',entry:e})}); return await r.json(); } catch { return null; } },
  async del(id) { try { await fetch(CONFIG.URL,{method:'POST',body:JSON.stringify({action:'delete',id})}); } catch {} },
  async fav(id) { try { await fetch(CONFIG.URL,{method:'POST',body:JSON.stringify({action:'toggleFavorite',id})}); } catch {} },
  async upload(b64,fn,dt) { try { const r=await fetch(CONFIG.URL,{method:'POST',body:JSON.stringify({action:'uploadPhoto',base64:b64,fileName:fn,date:dt,mimeType:'image/jpeg'})}); return await r.json(); } catch { return null; } },
};

// ─── Toast & Sync Badge ─────────────────────────────────────────
function showToast(msg,type='info'){const c=document.getElementById('toastContainer');c.innerHTML=`<div class="toast ${type}">${msg}</div>`;setTimeout(()=>c.innerHTML='',3000);}
function updateSync(s){const b=document.getElementById('syncBadge'),t=document.getElementById('syncText');if(!b)return;b.className='sync-badge '+s;const l={idle:'',syncing:'동기화...',synced:'완료',error:'오류'};t.textContent=l[s]||'';}

// ─── Setup Screen ───────────────────────────────────────────────
async function connectAndStart() {
  const url = document.getElementById('setupUrl').value.trim();
  if (!url) { document.getElementById('setupUrl').classList.add('error'); return; }
  
  const btn = document.getElementById('setupBtn');
  btn.disabled = true; btn.textContent = '연결 확인 중...';
  
  const ok = await API.test(url);
  if (ok) {
    CONFIG.URL = url;
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    startApp();
  } else {
    document.getElementById('setupUrl').classList.add('error');
    document.getElementById('setupError').style.display = 'block';
    btn.disabled = false; btn.textContent = '연결하고 시작하기';
  }
}

// ─── Cloud Sync ─────────────────────────────────────────────────
async function doSync() {
  updateSync('syncing');
  const data = await API.getAll();
  if (data) {
    state.entries = data; cacheLocal();
    updateSync('synced');
    showToast('클라우드에서 동기화 완료!','success');
    render();
  } else {
    updateSync('error');
    showToast('동기화 실패. 캐시 데이터 사용 중','error');
  }
}

// ─── Start App ──────────────────────────────────────────────────
async function startApp() {
  // 1. Show cached data immediately (for speed)
  const cached = loadCache();
  if (cached && cached.length) {
    state.entries = cached;
    render();
  } else {
    document.getElementById('content').innerHTML = '<div class="loading-screen"><div class="loading-spinner"></div><p style="font-size:13px;color:var(--text-muted)">클라우드에서 데이터를 불러오는 중...</p></div>';
  }
  // 2. Then sync from cloud (source of truth)
  await doSync();
}

// ─── Init ───────────────────────────────────────────────────────
function init() {
  if (CONFIG.URL) {
    // Already configured → go to app
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    startApp();
  }
  // else: show setup screen (default)
}

// ─── Computed ───────────────────────────────────────────────────
function getFiltered(){return state.entries.filter(e=>{if(state.favOnly&&!e.favorite)return false;if(state.filterTag&&!(e.tags||[]).includes(state.filterTag))return false;if(state.filterTrip&&e.tripGroup!==state.filterTrip)return false;if(state.search){const s=state.search.toLowerCase();return(e.location||'').toLowerCase().includes(s)||(e.memo||'').toLowerCase().includes(s)||(e.tags||[]).some(t=>t.toLowerCase().includes(s))||(e.country||'').toLowerCase().includes(s)||(e.tripGroup||'').toLowerCase().includes(s);}return true;}).sort((a,b)=>new Date(b.date)-new Date(a.date));}
function getAllTags(){const t=new Set();state.entries.forEach(e=>(e.tags||[]).forEach(x=>t.add(x)));return[...t].sort();}
function getAllTrips(){const t=new Set();state.entries.forEach(e=>{if(e.tripGroup)t.add(e.tripGroup);});return[...t].sort();}
function getStats(){const co=new Set(),ci=new Set();let p=0;state.entries.forEach(e=>{if(e.country)co.add(e.country);if(e.location)ci.add(e.location);p+=(e.photos||[]).length;});return{countries:co.size,cities:ci.size,photos:p};}

// ─── Actions (Cloud-First) ──────────────────────────────────────
async function addEntry(entry) {
  const n = {...entry, id: genId()};
  // 1. Save to cloud FIRST
  updateSync('syncing');
  const res = await API.add(n);
  if (res?.success) {
    // 2. Update local cache
    state.entries.push(n); cacheLocal();
    updateSync('synced');
    showToast('기록 저장 완료! (Drive에 저장됨)','success');
  } else {
    // Cloud failed - still add locally but warn
    state.entries.push(n); cacheLocal();
    updateSync('error');
    showToast('클라우드 저장 실패. 다음 동기화 시 재시도됩니다','error');
  }
  closeModal(); render();
}

async function deleteEntry(id) {
  if (!confirm('이 기록을 삭제할까요?')) return;
  state.entries = state.entries.filter(e=>e.id!==id); cacheLocal();
  closeModal(); render(); showToast('삭제 완료');
  await API.del(id);
}

async function toggleFav(id,ev) {
  if(ev)ev.stopPropagation();
  const e=state.entries.find(x=>x.id===id);
  if(e){e.favorite=!e.favorite;cacheLocal();render();}
  await API.fav(id);
}

// ─── Tabs ───────────────────────────────────────────────────────
const TABS=[{id:'gallery',icon:'grid',label:'갤러리'},{id:'trips',icon:'folder',label:'여행별'},{id:'map',icon:'map',label:'지도'},{id:'calendar',icon:'calendar',label:'캘린더'},{id:'timeline',icon:'clock',label:'타임라인'},{id:'stats',icon:'stats',label:'통계'}];
function renderTabs(){document.getElementById('tabs').innerHTML=TABS.map(t=>`<button class="tab-btn ${state.tab===t.id?'active':''}" onclick="switchTab('${t.id}')">${icon(t.icon,13)} ${t.label}</button>`).join('');}
function switchTab(id){state.tab=id;render();}

function renderFilterBar(){const bar=document.getElementById('filterBar');const show=['gallery','timeline','trips'].includes(state.tab);bar.style.display=show?'flex':'none';if(!show)return;const tags=getAllTags(),trips=getAllTrips();bar.innerHTML=`<div class="search-box">${icon('search',13,'var(--text-muted)')}<input value="${state.search}" oninput="state.search=this.value;renderContent()" placeholder="검색...">${state.search?`<button class="btn btn-ghost" onclick="state.search='';render()" style="padding:1px">${icon('x',11,'var(--text-muted)')}</button>`:''}</div><button class="filter-btn ${state.favOnly?'active':''}" onclick="state.favOnly=!state.favOnly;render()">${icon(state.favOnly?'heartFill':'heart',11,state.favOnly?'var(--accent)':'var(--text-muted)')} ♥</button>${tags.length?`<select class="filter-select" onchange="state.filterTag=this.value;render()"><option value="">태그</option>${tags.map(t=>`<option value="${t}" ${state.filterTag===t?'selected':''}>${t}</option>`).join('')}</select>`:''}${trips.length?`<select class="filter-select" onchange="state.filterTrip=this.value;render()"><option value="">여행</option>${trips.map(t=>`<option value="${t}" ${state.filterTrip===t?'selected':''}>${t}</option>`).join('')}</select>`:''}`;}

function renderContent(){const el=document.getElementById('content');switch(state.tab){case'gallery':el.innerHTML=renderGallery();break;case'trips':el.innerHTML=renderTrips();break;case'map':el.innerHTML=renderMap();break;case'calendar':el.innerHTML=renderCalendar();break;case'timeline':el.innerHTML=renderTimeline();break;case'stats':el.innerHTML=renderStatsView();break;}}

function updateHeaderSub(){const s=getStats();document.getElementById('headerSub').textContent=`${s.countries}개국 · ${s.cities}개 도시 · ${s.photos}장`;}
function render(){renderTabs();renderFilterBar();renderContent();updateHeaderSub();}

// ─── Gallery ────────────────────────────────────────────────────
function renderGallery(){const es=getFiltered();if(!es.length)return`<div class="empty-state">${icon('image',36,'var(--text-dim)')}<p>기록이 없습니다</p><p class="hint">새 기록을 추가해보세요!</p></div>`;return`<div class="gallery-grid">${es.map((e,i)=>`<div class="card" style="animation-delay:${i*0.03}s" onclick="showDetail('${e.id}')"><div class="card-img-wrap"><img class="card-img" src="${e.photos?.[0]||''}" alt="" loading="lazy" onerror="this.style.display='none'">${(e.photos||[]).length>1?`<div class="card-photo-count">📷${e.photos.length}</div>`:''}<button class="card-fav-btn" onclick="toggleFav('${e.id}',event)">${icon(e.favorite?'heartFill':'heart',12,e.favorite?'#ef4444':'#fff')}</button>${e.tripGroup?`<div class="card-trip-badge">📁${e.tripGroup}</div>`:''}</div><div class="card-body"><div class="card-location">${icon('pin',10,'var(--accent)')} ${e.location||''}</div><div class="card-date">${fmtDate(e.date)}</div>${e.memo?`<div class="card-memo">${e.memo}</div>`:''}${(e.tags||[]).length?`<div class="card-tags">${e.tags.slice(0,3).map(t=>`<span class="tag">#${t}</span>`).join('')}</div>`:''}</div></div>`).join('')}</div>${es.length?`<button class="fab" onclick="startSlideshow()">${icon('play',18,'#fff')}</button>`:''}`;}

// ─── Trips ──────────────────────────────────────────────────────
let openTrip=null;
function renderTrips(){const es=getFiltered();const groups={};es.forEach(e=>{const k=e.tripGroup||'미분류';if(!groups[k])groups[k]={n:k,es:[],cs:new Set(),p:0};groups[k].es.push(e);if(e.country)groups[k].cs.add(e.country);groups[k].p+=(e.photos||[]).length;});const sorted=Object.values(groups).sort((a,b)=>Math.max(...b.es.map(e=>new Date(e.date)))-Math.max(...a.es.map(e=>new Date(e.date))));return sorted.map(g=>{const o=openTrip===g.n;const cover=g.es[0]?.photos?.[0];const dr=g.es.length?`${fmtDate(g.es[g.es.length-1].date)} ~ ${fmtDate(g.es[0].date)}`:'';return`<div class="trip-card ${o?'open':''}" onclick="openTrip=openTrip==='${g.n}'?null:'${g.n}';render()"><div class="trip-cover">${cover?`<img src="${cover}" alt="">`:''}</div><div style="flex:1;min-width:0"><div class="trip-name">${icon('folder',13,'var(--accent)')} ${g.n}</div><div class="trip-date">${dr}</div><div class="trip-stats"><span>📍${g.es.length}개</span><span>📷${g.p}장</span><span>🌍${g.cs.size}개국</span></div></div><button class="btn btn-ghost" onclick="event.stopPropagation();startSlideshowGroup('${g.n}')" style="padding:5px">${icon('play',14,'var(--accent)')}</button><span style="transition:transform 0.2s;display:inline-block;transform:${o?'rotate(90deg)':'rotate(0)'}">${icon('chevR',16,'var(--text-dim)')}</span></div>${o?`<div class="trip-entries-grid">${g.es.sort((a,b)=>new Date(a.date)-new Date(b.date)).map(e=>`<div class="trip-entry-card" onclick="event.stopPropagation();showDetail('${e.id}')"><div class="img-wrap"><img src="${e.photos?.[0]||''}" alt="" loading="lazy" onerror="this.style.display='none'"></div><div class="info"><p>${(e.location||'').split(',')[0]}</p><p>${fmtDate(e.date)}</p></div></div>`).join('')}</div>`:''}`;}).join('');}

// ─── Map ────────────────────────────────────────────────────────
let mapSearch='';
function renderMap(){const groups={};state.entries.forEach(e=>{if(!e.lat||!e.lng)return;const k=`${(+e.lat).toFixed(1)},${(+e.lng).toFixed(1)}`;if(!groups[k])groups[k]={lat:+e.lat,lng:+e.lng,loc:e.location,es:[]};groups[k].es.push(e);});const gs=Object.values(groups);const fg=mapSearch?gs.filter(g=>(g.loc||'').toLowerCase().includes(mapSearch.toLowerCase())):gs;const proj=(lat,lng)=>{const x=(lng+180)*(800/360);const y=225-(Math.log(Math.tan(Math.PI/4+lat*Math.PI/360))*800)/(2*Math.PI);return{x,y};};const pins=fg.map(g=>{const p=proj(g.lat,g.lng);const r=Math.min(5+g.es.length*1.5,12);return`<g style="cursor:pointer" onclick="${g.es.length===1?`showDetail('${g.es[0].id}')`:`showPinList('${g.loc.replace(/'/g,"\\'")}')`}"><circle cx="${p.x}" cy="${p.y}" r="${r+5}" fill="var(--accent)" opacity="0.15"><animate attributeName="r" values="${r+5};${r+9};${r+5}" dur="2.5s" repeatCount="indefinite"/></circle><circle cx="${p.x}" cy="${p.y}" r="${r}" fill="var(--accent)" stroke="#fff" stroke-width="1.5"/>${g.es.length>1?`<text x="${p.x}" y="${p.y+1}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="7" font-weight="700">${g.es.length}</text>`:''}</g>`;}).join('');return`<div style="margin-top:8px"><div class="search-box" style="margin-bottom:10px">${icon('search',13,'var(--text-muted)')}<input value="${mapSearch}" oninput="mapSearch=this.value;renderContent()" placeholder="장소 검색..."></div><div class="map-container"><svg viewBox="0 0 800 450"><rect width="800" height="450" fill="#0a1628"/><g fill="#152238" stroke="#1c3050" stroke-width="0.4" opacity="0.9"><path d="M50,80Q90,70 140,90Q160,100 170,140Q175,170 160,200Q140,220 130,200Q110,170 80,190Q50,200 40,170Q30,130 50,80Z"/><path d="M140,230Q160,220 170,240Q180,280 175,320Q165,360 150,380Q135,390 130,370Q125,340 120,300Q115,260 140,230Z"/><path d="M350,80Q380,70 410,80Q430,90 420,120Q410,140 390,150Q370,155 355,140Q340,120 350,80Z"/><path d="M370,160Q400,150 420,170Q440,200 435,260Q425,310 400,340Q380,350 365,330Q350,290 355,240Q358,200 370,160Z"/><path d="M430,60Q500,50 570,70Q620,85 650,110Q670,140 660,170Q640,200 600,200Q560,195 530,180Q490,160 460,140Q435,120 430,90Q428,75 430,60Z"/><path d="M560,200Q590,190 610,210Q620,230 610,250Q590,240 570,230Q555,220 560,200Z"/><path d="M600,290Q640,275 670,290Q690,310 680,340Q660,355 630,350Q605,340 600,320Q598,305 600,290Z"/><ellipse cx="660" cy="140" rx="11" ry="22" transform="rotate(-15,660,140)"/></g>${pins}</svg><div class="map-legend">📍 ${gs.length}곳</div></div><div style="margin-top:12px"><h3 style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text-muted)">방문 장소</h3><div class="location-list">${fg.sort((a,b)=>b.es.length-a.es.length).map(g=>`<div class="location-item" onclick="${g.es.length===1?`showDetail('${g.es[0].id}')`:`showPinList('${g.loc.replace(/'/g,"\\'")}')`}"><div class="location-thumb"><img src="${g.es[0].photos?.[0]||''}" alt="" onerror="this.style.display='none'"></div><div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600">${g.loc}</div><div style="font-size:9px;color:var(--text-muted)">${g.es.length}개</div></div>${icon('chevR',13,'var(--text-dim)')}</div>`).join('')}</div></div></div>`;}

// ─── Calendar ───────────────────────────────────────────────────
let calDate=new Date();
function renderCalendar(){const yr=calDate.getFullYear(),mo=calDate.getMonth(),dim=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay();const byDate={};state.entries.forEach(e=>{const d=new Date(e.date);if(d.getFullYear()===yr&&d.getMonth()===mo){const k=d.getDate();if(!byDate[k])byDate[k]=[];byDate[k].push(e);}});const today=new Date();let cells='';for(let i=0;i<fd;i++)cells+=`<div class="cal-day empty"></div>`;for(let d=1;d<=dim;d++){const de=byDate[d];const has=de&&de.length>0;const td=d&&yr===today.getFullYear()&&mo===today.getMonth()&&d===today.getDate();cells+=`<div class="cal-day ${td?'today':''} ${has?'has-entry':''}" ${has&&de.length===1?`onclick="showDetail('${de[0].id}')"`:''}>` +`<span class="cal-day-num">${d}</span>`+(has?de.slice(0,1).map(e=>`<div class="cal-day-entry" onclick="event.stopPropagation();showDetail('${e.id}')">📍${(e.location||'').split(',')[0]}</div>`).join('')+(de.length>1?`<span style="font-size:7px;color:var(--text-dim)">+${de.length-1}</span>`:''):'')+'</div>';}return`<div style="max-width:700px;margin:0 auto"><div class="cal-nav"><button class="btn btn-default" onclick="calDate=new Date(${yr},${mo-1},1);render()">${icon('chevL',16)}</button><span class="cal-title">${yr}년 ${MONTHS[mo]}</span><button class="btn btn-default" onclick="calDate=new Date(${yr},${mo+1},1);render()">${icon('chevR',16)}</button></div><div class="cal-grid">${DAYS.map(d=>`<div class="cal-header">${d}</div>`).join('')}</div><div class="cal-grid">${cells}</div></div>`;}

// ─── Timeline ───────────────────────────────────────────────────
function renderTimeline(){const es=getFiltered();const groups={};es.forEach(e=>{const y=new Date(e.date).getFullYear();if(!groups[y])groups[y]=[];groups[y].push(e);});const sorted=Object.entries(groups).sort((a,b)=>b[0]-a[0]);return`<div style="max-width:600px;margin:0 auto;padding-top:8px">${sorted.map(([yr,ye])=>`<div style="margin-bottom:28px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span class="tl-year">${yr}</span><div style="flex:1;height:1px;background:var(--border)"></div><span style="font-size:10px;color:var(--text-muted)">${ye.length}개</span></div><div class="tl-line">${ye.map((e,i)=>`<div class="tl-item" style="animation-delay:${i*0.06}s" onclick="showDetail('${e.id}')"><div class="tl-dot"></div><div class="tl-card"><div style="display:flex;justify-content:space-between;align-items:start"><div><span style="font-size:10px;color:var(--text-muted)">${fmtDate(e.date)}${e.tripGroup?' · '+e.tripGroup:''}</span><h4 style="font-size:12px;font-weight:600;margin-top:1px">${icon('pin',10,'var(--accent)')} ${e.location}</h4></div><button class="btn btn-ghost" onclick="toggleFav('${e.id}',event)" style="padding:2px">${icon(e.favorite?'heartFill':'heart',12,e.favorite?'#ef4444':'var(--text-dim)')}</button></div>${e.memo?`<p style="font-size:10px;color:var(--text-muted);margin-top:4px;line-height:1.4">${e.memo}</p>`:''}${(e.photos||[]).length?`<div class="tl-photos">${e.photos.slice(0,4).map(p=>`<img src="${p}" alt="" loading="lazy" onerror="this.style.display='none'">`).join('')}${e.photos.length>4?`<div style="width:48px;height:48px;border-radius:5px;background:var(--bg-hover);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-muted);flex-shrink:0">+${e.photos.length-4}</div>`:''}</div>`:''}</div></div>`).join('')}</div></div>`).join('')}</div>`;}

// ─── Stats ──────────────────────────────────────────────────────
function renderStatsView(){const co={},ci={},mo=Array(12).fill(0);let photos=0,fav=0;state.entries.forEach(e=>{if(e.country)co[e.country]=(co[e.country]||0)+1;if(e.location)ci[e.location]=(ci[e.location]||0)+1;mo[new Date(e.date).getMonth()]++;photos+=(e.photos||[]).length;if(e.favorite)fav++;});const topCo=Object.entries(co).sort((a,b)=>b[1]-a[1]).slice(0,5);const topCi=Object.entries(ci).sort((a,b)=>b[1]-a[1]).slice(0,5);const maxMo=Math.max(...mo,1);return`<div style="max-width:700px;margin:0 auto;padding-top:8px"><h2 style="font-size:18px;font-weight:700;margin-bottom:14px;font-family:'Playfair Display',serif">나의 여행 통계</h2><div class="stats-grid"><div class="stat-card"><div style="margin-bottom:5px">${icon('globe',20,'var(--accent)')}</div><div class="stat-val" style="color:var(--accent)">${Object.keys(co).length}</div><div class="stat-label">방문 국가</div></div><div class="stat-card"><div style="margin-bottom:5px">${icon('pin',20,'#60a5fa')}</div><div class="stat-val" style="color:#60a5fa">${Object.keys(ci).length}</div><div class="stat-label">방문 도시</div></div><div class="stat-card"><div style="margin-bottom:5px">${icon('image',20,'#4ade80')}</div><div class="stat-val" style="color:#4ade80">${photos}</div><div class="stat-label">총 사진</div></div><div class="stat-card"><div style="margin-bottom:5px">${icon('heart',20,'#ef4444')}</div><div class="stat-val" style="color:#ef4444">${fav}</div><div class="stat-label">즐겨찾기</div></div></div><div class="chart-container"><h3 style="font-size:12px;font-weight:600;margin-bottom:12px">월별 기록</h3><div class="chart-bars">${mo.map((c,i)=>`<div class="chart-bar-wrap">${c>0?`<div class="chart-bar-val">${c}</div>`:''}<div class="chart-bar ${c?'':'empty'}" style="height:${Math.max((c/maxMo)*60,c?5:1)}px"></div><div class="chart-bar-label">${MONTHS[i].replace('월','')}</div></div>`).join('')}</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="rank-list"><h3 style="font-size:12px;font-weight:600;margin-bottom:8px">Top 국가</h3>${topCo.map(([n,c],i)=>`<div class="rank-item"><span class="rank-num" style="color:var(--accent)">${i+1}</span><span class="rank-name">${n}</span><span class="rank-count">${c}회</span></div>`).join('')}</div><div class="rank-list"><h3 style="font-size:12px;font-weight:600;margin-bottom:8px">Top 도시</h3>${topCi.map(([n,c],i)=>`<div class="rank-item"><span class="rank-num" style="color:#60a5fa">${i+1}</span><span class="rank-name">${n}</span><span class="rank-count">${c}회</span></div>`).join('')}</div></div></div>`;}

// ─── Detail ─────────────────────────────────────────────────────
let detailPhotoIdx=0;
function showDetail(id){const e=state.entries.find(x=>x.id===id);if(!e)return;detailPhotoIdx=0;renderDetail(e);}
function renderDetail(e){const ps=e.photos||[];document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">${ps.length?`<div class="detail-photo-wrap"><img class="detail-photo" src="${ps[detailPhotoIdx]}" alt="">${ps.length>1?`<button class="detail-nav-btn left" onclick="detailPhotoIdx=(detailPhotoIdx-1+${ps.length})%${ps.length};renderDetail(state.entries.find(x=>x.id==='${e.id}'))">${icon('chevL',16,'#fff')}</button><button class="detail-nav-btn right" onclick="detailPhotoIdx=(detailPhotoIdx+1)%${ps.length};renderDetail(state.entries.find(x=>x.id==='${e.id}'))">${icon('chevR',16,'#fff')}</button><div class="detail-dots">${ps.map((_,i)=>`<button class="detail-dot ${i===detailPhotoIdx?'active':'inactive'}" onclick="detailPhotoIdx=${i};renderDetail(state.entries.find(x=>x.id==='${e.id}'))"></button>`).join('')}</div>`:''}<button class="btn-icon" style="position:absolute;top:8px;right:8px" onclick="closeModal()">${icon('x',16,'#fff')}</button></div>`:''}<div class="detail-content"><div style="display:flex;align-items:start;justify-content:space-between"><div><div class="detail-title">${e.location}</div><div class="detail-meta">${fmtDate(e.date)}${e.country?' · '+e.country:''}${e.tripGroup?' · 📁'+e.tripGroup:''}</div></div><button class="btn btn-ghost" onclick="toggleFav('${e.id}');renderDetail(state.entries.find(x=>x.id==='${e.id}'))">${icon(e.favorite?'heartFill':'heart',20,e.favorite?'#ef4444':'var(--text-dim)')}</button></div>${e.memo?`<div class="detail-memo">${e.memo}</div>`:''}${(e.tags||[]).length?`<div class="detail-tags">${e.tags.map(t=>`<span class="detail-tag">#${t}</span>`).join('')}</div>`:''}${ps.length>1?`<div class="detail-thumbs">${ps.map((p,i)=>`<img class="detail-thumb ${i===detailPhotoIdx?'active':'inactive'}" src="${p}" onclick="detailPhotoIdx=${i};renderDetail(state.entries.find(x=>x.id==='${e.id}'))" alt="">`).join('')}</div>`:''}<div class="detail-actions"><button class="btn btn-default" style="flex:1;color:var(--accent)" onclick="closeModal();startSlideshowSingle('${e.id}')">${icon('play',13,'var(--accent)')} 슬라이드쇼</button><button class="btn btn-danger" onclick="deleteEntry('${e.id}')">${icon('trash',13,'var(--danger)')}</button></div></div></div></div>`;}

// ─── Add Modal (Cloud-First) ────────────────────────────────────
let addPhotos=[];
function showAddModal(){addPhotos=[];const trips=getAllTrips();document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><h2>새 여행 기록</h2><button class="btn btn-ghost" onclick="closeModal()">${icon('x',18,'var(--text-muted)')}</button></div><div class="modal-body"><div class="form-group"><label class="form-label">📸 사진 (Google Drive에 저장됨)</label><input type="file" id="photoInput" multiple accept="image/*" capture="environment" style="display:none" onchange="handlePhotoUpload(this)"><button class="upload-zone" onclick="document.getElementById('photoInput').click()">${icon('upload',20,'var(--text-muted)')}사진 선택 또는 촬영</button><div class="photo-previews" id="photoPreviews"></div><details style="margin-top:5px"><summary style="font-size:9px;color:var(--text-dim);cursor:pointer">URL로 추가</summary><textarea id="photoUrls" class="form-input" style="margin-top:3px;min-height:40px;resize:vertical" placeholder="URL을 한 줄씩..."></textarea></details></div><div class="form-group"><label class="form-label">📁 여행 그룹</label><div style="display:flex;gap:5px">${trips.length?`<select id="tripSelect" class="form-input" style="flex:1" onchange="document.getElementById('newTrip').value=''"><option value="">기존 선택</option>${trips.map(t=>`<option value="${t}">${t}</option>`).join('')}</select>`:''}<input id="newTrip" class="form-input" style="flex:1" placeholder="새 여행명" ${trips.length?`onchange="document.getElementById('tripSelect').value=''"`:''}/></div></div><div class="form-row"><div class="form-group"><label class="form-label">📅 날짜</label><input id="entryDate" type="date" class="form-input" value="${new Date().toISOString().split('T')[0]}"></div><div class="form-group"><label class="form-label">🌍 국가</label><input id="entryCountry" class="form-input" placeholder="Japan"></div></div><div class="form-group"><label class="form-label">📍 장소</label><input id="entryLocation" class="form-input" placeholder="Tokyo, Japan"></div><div class="form-row"><div class="form-group"><label class="form-label">위도</label><input id="entryLat" class="form-input" placeholder="35.6762"></div><div class="form-group"><label class="form-label">경도</label><input id="entryLng" class="form-input" placeholder="139.6503"></div></div><div class="form-group"><label class="form-label">📝 메모</label><textarea id="entryMemo" class="form-input" style="min-height:44px;resize:vertical" placeholder="짧은 메모"></textarea></div><div class="form-group"><label class="form-label">🏷️ 태그 (쉼표)</label><input id="entryTags" class="form-input" placeholder="벚꽃, 맛집"></div><div class="form-group"><label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px"><input type="checkbox" id="entryFav" style="accent-color:var(--accent)"> ❤️ 즐겨찾기</label></div><button class="btn btn-primary" id="submitBtn" style="width:100%;padding:10px 0;font-size:13px;border-radius:8px" onclick="submitEntry()">☁️ Drive에 저장하기</button></div></div></div>`;}

function handlePhotoUpload(input){Array.from(input.files||[]).forEach(file=>{const reader=new FileReader();reader.onload=e=>{addPhotos.push({data:e.target.result,name:file.name});renderPhotoPreviews();};reader.readAsDataURL(file);});input.value='';}
function renderPhotoPreviews(){const el=document.getElementById('photoPreviews');if(!el)return;el.innerHTML=addPhotos.map((p,i)=>`<div class="photo-preview"><img src="${p.data}" alt=""><button class="remove-btn" onclick="addPhotos.splice(${i},1);renderPhotoPreviews()">✕</button></div>`).join('');}

async function submitEntry(){
  const loc=document.getElementById('entryLocation').value;
  const date=document.getElementById('entryDate').value;
  if(!loc||!date){alert('날짜와 장소 필수!');return;}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='☁️ Drive에 업로드 중...';

  let photoList=(document.getElementById('photoUrls')?.value||'').split('\n').map(u=>u.trim()).filter(Boolean);
  // Upload ALL photos to Google Drive
  for(const lp of addPhotos){
    btn.textContent=`☁️ 사진 업로드 중... (${photoList.length+1}/${addPhotos.length+photoList.length})`;
    const r=await API.upload(lp.data,lp.name,date);
    if(r?.success){photoList.push(r.url);}else{showToast('사진 업로드 실패: '+lp.name,'error');}
  }

  const tripSel=document.getElementById('tripSelect');
  const trip=document.getElementById('newTrip').value||(tripSel?tripSel.value:'');
  await addEntry({date,location:loc,country:document.getElementById('entryCountry').value,lat:document.getElementById('entryLat').value?+document.getElementById('entryLat').value:null,lng:document.getElementById('entryLng').value?+document.getElementById('entryLng').value:null,memo:document.getElementById('entryMemo').value,tags:document.getElementById('entryTags').value.split(',').map(t=>t.trim()).filter(Boolean),favorite:document.getElementById('entryFav').checked,tripGroup:trip,photos:photoList});
}

// ─── Pin List ───────────────────────────────────────────────────
function showPinList(location){const es=state.entries.filter(e=>e.location===location).sort((a,b)=>new Date(b.date)-new Date(a.date));document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()" style="max-height:80vh"><div class="modal-header"><h2>📍 ${location} (${es.length})</h2><button class="btn btn-ghost" onclick="closeModal()">${icon('x',16,'var(--text-muted)')}</button></div><div style="padding:8px">${es.map(e=>`<div class="pin-list-item" onclick="closeModal();setTimeout(()=>showDetail('${e.id}'),100)"><div class="location-thumb"><img src="${e.photos?.[0]||''}" alt="" onerror="this.style.display='none'"></div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600">${fmtDate(e.date)}</div>${e.memo?`<div style="font-size:10px;color:var(--text-muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.memo}</div>`:''}${e.tripGroup?`<div style="font-size:9px;color:var(--accent);margin-top:1px">📁 ${e.tripGroup}</div>`:''}</div>${e.favorite?icon('heartFill',11,'#ef4444'):''}</div>`).join('')}</div></div></div>`;}

// ─── Slideshow ──────────────────────────────────────────────────
let ssPhotos=[],ssIdx=0,ssPlaying=true,ssDur=4500,ssTimer=null,ssProgressTimer=null,ssAudio=null;
function startSlideshow(){_startSS(getFiltered());}
function startSlideshowGroup(tn){_startSS(state.entries.filter(e=>e.tripGroup===tn));}
function startSlideshowSingle(id){_startSS(state.entries.filter(e=>e.id===id));}
function _startSS(entries){ssPhotos=[];entries.forEach(e=>(e.photos||[]).forEach(u=>ssPhotos.push({u,loc:e.location,dt:e.date,memo:e.memo,trip:e.tripGroup})));if(!ssPhotos.length){showToast('사진이 없습니다');return;}ssIdx=0;ssPlaying=true;ssAudio=new Audio();ssAudio.loop=true;renderSS();ssSchedule();}
function ssSchedule(){clearTimeout(ssTimer);clearInterval(ssProgressTimer);if(!ssPlaying)return;const start=Date.now();ssProgressTimer=setInterval(()=>{const bar=document.getElementById('ssProgressBar');if(bar)bar.style.width=Math.min((Date.now()-start)/ssDur*100,100)+'%';},30);ssTimer=setTimeout(()=>{ssIdx=(ssIdx+1)%ssPhotos.length;renderSS();ssSchedule();},ssDur);}
function ssToggle(){ssPlaying=!ssPlaying;if(ssPlaying){ssSchedule();if(ssAudio?.src)ssAudio.play().catch(()=>{});}else{clearTimeout(ssTimer);clearInterval(ssProgressTimer);ssAudio?.pause();}renderSS();}
function ssNext(){ssIdx=(ssIdx+1)%ssPhotos.length;renderSS();if(ssPlaying)ssSchedule();}
function ssPrev(){ssIdx=(ssIdx-1+ssPhotos.length)%ssPhotos.length;renderSS();if(ssPlaying)ssSchedule();}
function ssClose(){clearTimeout(ssTimer);clearInterval(ssProgressTimer);if(ssAudio){ssAudio.pause();ssAudio=null;}document.getElementById('modalContainer').innerHTML='';}
function ssMusicUpload(input){const file=input.files?.[0];if(file&&ssAudio){ssAudio.src=URL.createObjectURL(file);ssAudio.play().catch(()=>{});document.getElementById('ssMusicName').textContent='🎵 '+file.name;document.getElementById('ssMusicLabel').style.display='block';}}
function renderSS(){const c=ssPhotos[ssIdx];document.getElementById('modalContainer').innerHTML=`<div class="slideshow"><div class="slideshow-img-wrap"><img class="slideshow-img" src="${c.u}" alt=""><div class="slideshow-gradient"></div></div><div class="slideshow-progress"><div class="slideshow-progress-bar" id="ssProgressBar"></div></div><div class="slideshow-top"><span class="slideshow-counter">${ssIdx+1}/${ssPhotos.length}</span><button class="btn-icon" onclick="ssClose()">${icon('x',16,'#fff')}</button></div><div class="slideshow-info">${c.trip?`<div class="slideshow-trip">📁 ${c.trip}</div>`:''}<div class="slideshow-location">${c.loc}</div><div class="slideshow-date">${fmtDate(c.dt)}</div>${c.memo?`<div class="slideshow-memo">${c.memo}</div>`:''}</div><div class="slideshow-controls"><button class="ss-ctrl-btn" onclick="ssPrev()">${icon('chevL',16,'#fff')}</button><button class="ss-play-btn" onclick="ssToggle()">${icon(ssPlaying?'pause':'play',18,'var(--accent)')}</button><button class="ss-ctrl-btn" onclick="ssNext()">${icon('chevR',16,'#fff')}</button><input type="file" id="ssMusicInput" accept="audio/*" style="display:none" onchange="ssMusicUpload(this)"><button class="ss-ctrl-btn" onclick="document.getElementById('ssMusicInput').click()">${icon('music',14,'#fff')}</button></div><div class="ss-music-label" id="ssMusicLabel" style="display:none"><span id="ssMusicName"></span></div></div>`;}

// ─── Settings ───────────────────────────────────────────────────
function showSettings(){document.getElementById('modalContainer').innerHTML=`<div class="modal-overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()" style="max-height:80vh"><div class="modal-header"><h2>⚙️ 설정</h2><button class="btn btn-ghost" onclick="closeModal()">${icon('x',16,'var(--text-muted)')}</button></div><div class="modal-body"><div class="settings-section"><h4>${icon('cloud',14,'var(--accent)')} Google Drive 연동</h4><label class="form-label">Apps Script URL</label><input id="cfgUrl" class="form-input" value="${CONFIG.URL}" placeholder="https://script.google.com/macros/s/..."><div class="settings-hint">현재 연결된 Apps Script URL입니다. 변경 시 데이터가 새 위치에서 로드됩니다.</div><button class="btn btn-default" style="width:100%;margin-top:8px;justify-content:center" onclick="closeModal();doSync()">${icon('sync',12)} 지금 동기화</button></div><div class="settings-section"><h4>${icon('map',14,'#60a5fa')} Google Maps (선택)</h4><label class="form-label">API Key</label><input id="cfgMaps" class="form-input" value="${CONFIG.MAPS}" placeholder="AIza..."></div><button class="btn btn-primary" style="width:100%;justify-content:center;padding:9px 0" onclick="saveSettings()">설정 저장</button><button class="btn btn-danger" style="width:100%;justify-content:center;padding:9px 0;margin-top:8px" onclick="if(confirm('연결을 해제하면 다시 URL을 입력해야 합니다.')){CONFIG.URL='';CONFIG.MAPS='';localStorage.removeItem('tj_cfg');localStorage.removeItem('${CACHE_KEY}');location.reload();}">연결 해제 및 초기화</button><div class="footer-credit" style="margin-top:12px">DEVELOPED BY DONGGU KANG</div></div></div></div>`;}
function saveSettings(){CONFIG.URL=document.getElementById('cfgUrl').value.trim();CONFIG.MAPS=document.getElementById('cfgMaps').value.trim();showToast('설정 저장!','success');closeModal();doSync();}
function closeModal(){document.getElementById('modalContainer').innerHTML='';}

init();
</script>
</body>
</html>
